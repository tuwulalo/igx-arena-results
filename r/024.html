<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drum Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0a0f;
  font-family:'Inter',sans-serif;
  overflow:hidden;
  color:#fff;
  height:100vh;
  width:100vw;
  cursor:default;
  user-select:none;
}

#canvas-container{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}

canvas{display:block}

#ui-overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:10;
  pointer-events:none;
}

#header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 28px;
  background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,transparent 100%);
  pointer-events:auto;
}

#header h1{
  font-size:22px;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  background:linear-gradient(135deg,#ff6b35,#ff2d78,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:none;
}

#header .subtitle{
  font-size:11px;
  font-weight:300;
  color:rgba(255,255,255,0.45);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:2px;
}

.controls-right{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  padding:8px 16px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  backdrop-filter:blur(10px);
  letter-spacing:1px;
  text-transform:uppercase;
  pointer-events:auto;
}

.btn:hover{
  background:rgba(255,107,53,0.2);
  border-color:rgba(255,107,53,0.4);
}

.btn.active{
  background:rgba(255,45,120,0.25);
  border-color:rgba(255,45,120,0.5);
}

#bottom-panel{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:20;
  padding:16px 28px 20px;
  background:linear-gradient(0deg,rgba(0,0,0,0.9) 0%,transparent 100%);
  pointer-events:auto;
}

#keys-hint{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:12px;
}

.key-badge{
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;
  padding:5px 10px;
  font-size:11px;
  transition:all 0.15s;
}

.key-badge .key{
  background:rgba(255,255,255,0.12);
  border-radius:4px;
  padding:2px 7px;
  font-weight:700;
  font-size:11px;
  min-width:20px;
  text-align:center;
}

.key-badge .label{
  color:rgba(255,255,255,0.6);
  font-weight:400;
  font-size:10px;
}

.key-badge.hit{
  border-color:rgba(255,107,53,0.6);
  background:rgba(255,107,53,0.15);
}

#volume-control{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}

#volume-control label{
  font-size:11px;
  color:rgba(255,255,255,0.5);
  text-transform:uppercase;
  letter-spacing:1px;
}

input[type=range]{
  -webkit-appearance:none;
  width:180px;
  height:4px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;
  outline:none;
}

input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:#ff6b35;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,107,53,0.5);
}

#bpm-display{
  position:fixed;
  top:80px;right:28px;
  z-index:20;
  text-align:right;
  pointer-events:auto;
}

#bpm-display .bpm-val{
  font-size:48px;
  font-weight:900;
  background:linear-gradient(135deg,#ff6b35,#ff2d78);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
}

#bpm-display .bpm-label{
  font-size:10px;
  color:rgba(255,255,255,0.35);
  letter-spacing:3px;
  text-transform:uppercase;
}

#metronome-controls{
  display:flex;
  gap:6px;
  margin-top:8px;
  justify-content:flex-end;
}

#metronome-controls .btn{
  padding:6px 12px;
  font-size:11px;
}

#info-panel{
  position:fixed;
  top:80px;left:28px;
  z-index:20;
  pointer-events:none;
}

#info-panel .stat{
  margin-bottom:6px;
  font-size:11px;
  color:rgba(255,255,255,0.3);
  letter-spacing:1px;
}

#info-panel .stat span{
  color:rgba(255,255,255,0.7);
  font-weight:600;
}

#flash{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:5;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.05s;
}

#tooltip{
  position:fixed;
  z-index:30;
  background:rgba(0,0,0,0.85);
  border:1px solid rgba(255,107,53,0.3);
  border-radius:8px;
  padding:8px 14px;
  font-size:12px;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  backdrop-filter:blur(10px);
}

.loading-screen{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:100;
  background:#0a0a0f;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:opacity 0.6s;
}

.loading-screen.hidden{
  opacity:0;
  pointer-events:none;
}

.loading-screen h2{
  font-size:28px;
  font-weight:900;
  letter-spacing:6px;
  text-transform:uppercase;
  background:linear-gradient(135deg,#ff6b35,#ff2d78,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.loader-bar{
  width:200px;height:3px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;
  overflow:hidden;
}

.loader-bar .fill{
  height:100%;
  background:linear-gradient(90deg,#ff6b35,#ff2d78);
  border-radius:2px;
  animation:loadAnim 1.2s ease-in-out infinite;
}

@keyframes loadAnim{
  0%{width:0;margin-left:0}
  50%{width:70%;margin-left:15%}
  100%{width:0;margin-left:100%}
}

#pattern-panel{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:50;
  background:rgba(10,10,15,0.95);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:30px;
  backdrop-filter:blur(20px);
  display:none;
  min-width:500px;
  pointer-events:auto;
}

#pattern-panel.visible{display:block}

#pattern-panel h3{
  font-size:16px;
  font-weight:700;
  margin-bottom:16px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#ff6b35;
}

.pattern-grid{
  display:grid;
  grid-template-columns:80px repeat(16,1fr);
  gap:3px;
  margin-bottom:16px;
}

.pattern-cell{
  width:100%;aspect-ratio:1;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.1s;
}

.pattern-cell:hover{
  background:rgba(255,255,255,0.1);
}

.pattern-cell.active{
  background:rgba(255,107,53,0.5);
  border-color:rgba(255,107,53,0.7);
  box-shadow:0 0 8px rgba(255,107,53,0.3);
}

.pattern-cell.current{
  border-color:rgba(255,255,255,0.5);
}

.pattern-label{
  display:flex;
  align-items:center;
  font-size:10px;
  color:rgba(255,255,255,0.5);
  letter-spacing:1px;
  text-transform:uppercase;
}

.pattern-header{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  color:rgba(255,255,255,0.25);
}

@media(max-width:768px){
  #header{padding:10px 16px}
  #header h1{font-size:16px}
  #bottom-panel{padding:10px 16px 14px}
  #bpm-display{top:60px;right:16px}
  #bpm-display .bpm-val{font-size:32px}
  #info-panel{top:60px;left:16px}
  .key-badge{padding:3px 7px;font-size:10px}
  #pattern-panel{min-width:auto;width:95vw;padding:16px}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <h2>Drum Studio</h2>
  <div class="loader-bar"><div class="fill"></div></div>
</div>

<div id="canvas-container"></div>
<div id="flash"></div>
<div id="tooltip"></div>

<div id="ui-overlay">
  <div id="header">
    <div>
      <h1>🥁 3D Drum Studio</h1>
      <div class="subtitle">Web Audio + Three.js</div>
    </div>
    <div class="controls-right">
      <button class="btn" id="btnPattern" onclick="togglePatternPanel()">🎹 Паттерн</button>
      <button class="btn" id="btnRecord" onclick="toggleRecord()">⏺ Запись</button>
      <button class="btn" id="btnPlay" onclick="playRecorded()">▶ Воспр.</button>
    </div>
  </div>

  <div id="info-panel">
    <div class="stat">Ударов: <span id="hitCount">0</span></div>
    <div class="stat">FPS: <span id="fpsCounter">60</span></div>
    <div class="stat">Нота: <span id="lastNote">—</span></div>
  </div>

  <div id="bpm-display">
    <div class="bpm-val" id="bpmValue">120</div>
    <div class="bpm-label">BPM</div>
    <div id="metronome-controls">
      <button class="btn" onclick="changeBpm(-5)">−</button>
      <button class="btn" id="btnMetro" onclick="toggleMetronome()">▶ Метроном</button>
      <button class="btn" onclick="changeBpm(5)">+</button>
    </div>
  </div>

  <div id="pattern-panel">
    <h3>🎹 Секвенсор паттернов</h3>
    <div class="pattern-grid" id="patternGrid"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="clearPattern()">Очистить</button>
      <button class="btn" onclick="randomizePattern()">🎲 Случайный</button>
      <button class="btn" id="btnSeqPlay" onclick="toggleSequencer()">▶ Старт</button>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="keys-hint"></div>
    <div id="volume-control">
      <label>🔊 Громкость</label>
      <input type="range" id="volumeSlider" min="0" max="100" value="75" oninput="setVolume(this.value)">
      <label id="volumeVal">75%</label>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
"use strict";

// ===== CONFIG =====
const DRUMS = [
  {id:'kick',    name:'Бас-бочка',    key:'Space',  color:0xff2d78, radius:1.4, height:1.6, pos:[0,-0.8,0],     type:'kick'},
  {id:'snare',   name:'Малый барабан',key:'KeyF',   color:0xff6b35, radius:0.7, height:0.45,pos:[-1.5,0.2,0.8], type:'snare'},
  {id:'hihat',   name:'Хай-хэт',      key:'KeyG',   color:0xa855f7, radius:0.75,height:0.08,pos:[-2.2,0.8,0.8], type:'hihat'},
  {id:'tom1',    name:'Том 1',        key:'KeyR',   color:0x06b6d4, radius:0.6, height:0.5, pos:[-0.7,0.4,-1.2],type:'tom'},
  {id:'tom2',    name:'Том 2',        key:'KeyT',   color:0x10b981, radius:0.6, height:0.5, pos:[0.7,0.4,-1.2], type:'tom'},
  {id:'floor',   name:'Напольный том',key:'KeyH',   color:0xf59e0b, radius:0.75,height:0.6, pos:[1.8,0.1,0.8],  type:'tom'},
  {id:'crash',   name:'Крэш',         key:'KeyV',   color:0xf97316, radius:0.9, height:0.06,pos:[-2.8,1.3,-0.3],type:'cymbal'},
  {id:'ride',    name:'Райд',         key:'KeyY',   color:0x8b5cf6, radius:0.95,height:0.06,pos:[2.6,1.3,-0.3], type:'cymbal'},
];

const KEY_MAP = {};
DRUMS.forEach(d => KEY_MAP[d.key] = d.id);

// ===== AUDIO ENGINE =====
let audioCtx, masterGain, compressor;
let volume = 0.75;

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = volume;
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -20;
  compressor.knee.value = 10;
  compressor.ratio.value = 4;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.15;
  masterGain.connect(compressor);
  compressor.connect(audioCtx.destination);
}

function setVolume(v){
  volume = v/100;
  if(masterGain) masterGain.gain.value = volume;
  document.getElementById('volumeVal').textContent = v+'%';
}
window.setVolume = setVolume;

function playDrumSound(type){
  if(!audioCtx) initAudio();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  switch(type){
    case 'kick': playKick(now); break;
    case 'snare': playSnare(now); break;
    case 'hihat': playHiHat(now); break;
    case 'tom': playTom(now); break;
    case 'cymbal': playCymbal(now); break;
  }
}

function playKick(t){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(30, t+0.12);
  gain.gain.setValueAtTime(1.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(t);
  osc.stop(t+0.4);

  // click
  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(800, t);
  osc2.frequency.exponentialRampToValueAtTime(100, t+0.02);
  g2.gain.setValueAtTime(0.5, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t+0.04);
  osc2.connect(g2);
  g2.connect(masterGain);
  osc2.start(t);
  osc2.stop(t+0.05);

  // sub
  const osc3 = audioCtx.createOscillator();
  const g3 = audioCtx.createGain();
  osc3.type = 'sine';
  osc3.frequency.setValueAtTime(60, t);
  g3.gain.setValueAtTime(0.6, t);
  g3.gain.exponentialRampToValueAtTime(0.001, t+0.3);
  osc3.connect(g3);
  g3.connect(masterGain);
  osc3.start(t);
  osc3.stop(t+0.35);
}

function playSnare(t){
  // noise
  const bufSize = audioCtx.sampleRate * 0.15;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = Math.random()*2-1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(0.7, t);
  nGain.gain.exponentialRampToValueAtTime(0.001, t+0.15);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'highpass';
  filt.frequency.value = 2000;
  noise.connect(filt);
  filt.connect(nGain);
  nGain.connect(masterGain);
  noise.start(t);
  noise.stop(t+0.15);

  // tone
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(250, t);
  osc.frequency.exponentialRampToValueAtTime(120, t+0.05);
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t+0.1);
}

function playHiHat(open){
  const t = audioCtx.currentTime;
  const dur = open ? 0.4 : 0.08;
  const bufSize = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = Math.random()*2-1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 6000;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 10000;
  bp.Q.value = 1;
  noise.connect(hp);
  hp.connect(bp);
  bp.connect(g);
  g.connect(masterGain);
  noise.start(t);
  noise.stop(t+dur);
}

function playTom(t){
  const baseFreq = 120 + Math.random()*60;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(baseFreq*2, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq, t+0.08);
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t+0.35);

  // noise burst
  const bufSize = audioCtx.sampleRate*0.05;
  const buf = audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*0.3;
  const n = audioCtx.createBufferSource();
  n.buffer = buf;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.3, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t+0.05);
  n.connect(ng);
  ng.connect(masterGain);
  n.start(t);
  n.stop(t+0.06);
}

function playCymbal(){
  const t = audioCtx.currentTime;
  const dur = 1.5;
  const bufSize = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=Math.random()*2-1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 8000;
  bp.Q.value = 0.5;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 4000;
  noise.connect(hp);
  hp.connect(bp);
  bp.connect(g);
  g.connect(masterGain);
  noise.start(t);
  noise.stop(t+dur);
}

// ===== THREE.JS SCENE =====
let scene, camera, renderer, controls;
let drumMeshes = {};
let hitCount = 0;
let frameCount = 0, lastFpsTime = 0;

function initScene(){
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a0f, 0.06);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 4.5, 7);

  renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 3;
  controls.maxDistance = 15;
  controls.maxPolarAngle = Math.PI/2 + 0.3;
  controls.target.set(0, 0.5, 0);

  // Lights
  const ambient = new THREE.AmbientLight(0x222233, 0.6);
  scene.add(ambient);

  const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
  mainLight.position.set(5, 8, 5);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.set(1024, 1024);
  mainLight.shadow.camera.near = 0.5;
  mainLight.shadow.camera.far = 25;
  mainLight.shadow.camera.left = -6;
  mainLight.shadow.camera.right = 6;
  mainLight.shadow.camera.top = 6;
  mainLight.shadow.camera.bottom = -6;
  scene.add(mainLight);

  const rim = new THREE.DirectionalLight(0xa855f7, 0.4);
  rim.position.set(-5, 3, -3);
  scene.add(rim);

  const spot1 = new THREE.SpotLight(0xff6b35, 0.8, 20, Math.PI/6, 0.5);

  // Floor

  });

  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid helper subtle
  const gridHelper = new THREE.GridHelper(20, 40, 0x222233, 0x151520);

  // Stage platform

  });

  stage.position.y = 0.075;
  stage.receiveShadow = true;
  stage.castShadow = true;

  createDrumKit();

function createDrumMaterial(color, rough, metal){
  return new THREE.MeshStandardMaterial({
    color: color,
    roughness: rough !== undefined ? rough : 0.35,
    metalness: metal !== undefined ? metal : 0.6,
    envMapIntensity: 0.8
  });
}

function createDrumKit(){
  DRUMS.forEach(drum => {
    const group = new THREE.Group();
    let mesh;

    switch(drum.type){
      case 'kick': {
        // Body
        const bodyGeo = new THREE.CylinderGeometry(drum.radius, drum.radius, drum.height, 32);
        const bodyMat = createDrumMaterial(0x1a1a1a, 0.6, 0.2);
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        // Top head
        const headGeo = new THREE.CircleGeometry(drum.radius, 32);
        const headMat = createDrumMaterial(drum.color, 0.3, 0.1);
        const head = new THREE.Mesh(headGeo, headMat);
        head.rotation.x = -Math.PI/2;
        head.position.y = drum.height/2 + 0.01;
        group.add(head);

        // Ring
        const ringGeo = new THREE.TorusGeometry(drum.radius, 0.04, 8, 48);
        const ringMat = createDrumMaterial(0x888888, 0.2, 0.8);
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI/2;
        ring.position.y = drum.height/2;
        group.add(ring);

        // Bottom ring
        const ring2 = ring.clone();
        ring2.position.y = -drum.height/2;
        group.add(ring2);

        // Lugs
        for(let i=0;i<8;i++){
          const lugGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.2, 8);
          const lugMat = createDrumMaterial(0xcccccc, 0.2, 0.9);
          const lug = new THREE.Mesh(lugGeo, lugMat);
          const angle = (i/8)*Math.PI*2;
          lug.position.set(Math.cos(angle)*(drum.radius+0.05), 0, Math.sin(angle)*(drum.radius+0.05));
          group.add(lug);
        }

        // Logo
        const logoGeo = new THREE.RingGeometry(0.3, 0.35, 32);
        const logoMat = createDrumMaterial(0xff2d78, 0.2, 0.5);
        const logo = new THREE.Mesh(logoGeo, logoMat);
        logo.position.set(0, 0, drum.radius+0.01);
        group.add(logo);

        mesh = head;
        break;
      }

      case 'snare': {
        // Shell
        const shellGeo = new THREE.CylinderGeometry(drum.radius, drum.radius*0.95, drum.height, 32);
        const shellMat = createDrumMaterial(0xc0a060, 0.3, 0.7);
        const shell = new THREE.Mesh(shellGeo, shellMat);
        shell.castShadow = true;
        shell.receiveShadow = true;
        group.add(shell);

        // Top head
        const headGeo = new THREE.CircleGeometry(drum.radius, 32);
        const headMat = createDrumMaterial(0xeeeeee, 0.25, 0.05);
        const head = new THREE.Mesh(headGeo, headMat);
        head.rotation.x = -Math.PI/2;
        head.position.y = drum.height/2 + 0.01;
        group.add(head);

        // Rim
        const rimGeo = new THREE.TorusGeometry(drum.radius, 0.03, 8, 48);
        const rimMat = createDrumMaterial(0xcccccc, 0.15, 0.9);
        const rimMesh = new THREE.Mesh(rimGeo, rimMat);
        rimMesh.rotation.x = Math.PI/2;
        rimMesh.position.y = drum.height/2;
        group.add(rimMesh);

        // Snare wires (bottom detail)
        for(let i=-3;i<=3;i++){
          const wireGeo = new THREE.CylinderGeometry(0.005, 0.005, drum.radius*1.5, 4);
          const wireMat = createDrumMaterial(0xdddddd, 0.2, 0.8);
          const wire = new THREE.Mesh(wireGeo, wireMat);
          wire.rotation.z = Math.PI/2;
          wire.position.set(0, -drum.height/2-0.02, i*0.04);
          group.add(wire);
        }

        // Tension rods
        for(let i=0;i<8;i++){
          const rodGeo = new THREE.CylinderGeometry(0.015, 0.015, drum.height+0.1, 6);
          const rodMat = createDrumMaterial(0xaaaaaa, 0.2, 0.9);
          const rod = new THREE.Mesh(rodGeo, rodMat);
          const a = (i/8)*Math.PI*2;
          rod.position.set(Math.cos(a)*(drum.radius+0.02), 0, Math.sin(a)*(drum.radius+0.02));
          group.add(rod);
        }

        mesh = head;
        break;
      }

      case 'hihat': {
        // Stand pole
        const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, drum.pos[1]+0.5, 8);
        const poleMat = createDrumMaterial(0x888888, 0.3, 0.7);
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.y = -(drum.pos[1]+0.5)/2;
        group.add(pole);

        // Base legs
        for(let i=0;i<3;i++){
          const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.6, 6);
          const leg = new THREE.Mesh(legGeo, poleMat);
          const a = (i/3)*Math.PI*2;
          leg.position.set(Math.cos(a)*0.3, -drum.pos[1]-0.1, Math.sin(a)*0.3);
          leg.rotation.x = 0.4;
          leg.rotation.y = a;
          group.add(leg);
        }

        // Bottom cymbal
        const cymGeo = new THREE.CylinderGeometry(drum.radius, drum.radius*0.8, drum.height, 32);
        const cymMat = createDrumMaterial(drum.color, 0.2, 0.85);
        const bottom = new THREE.Mesh(cymGeo, cymMat);
        bottom.position.y = -0.03;
        bottom.castShadow = true;
        group.add(bottom);

        // Top cymbal
        const topGeo = new THREE.CylinderGeometry(drum.radius*0.98, drum.radius*0.75, drum.height, 32);
        const top = new THREE.Mesh(topGeo, cymMat);
        top.position.y = 0.06;
        top.castShadow = true;
        group.add(top);

        // Wing nut
        const nutGeo = new THREE.CylinderGeometry(0.06, 0.04, 0.08, 6);
        const nutMat = createDrumMaterial(0xcccccc, 0.2, 0.9);
        const nut = new THREE.Mesh(nutGeo, nutMat);
        nut.position.y = 0.12;
        group.add(nut);

        mesh = top;
        break;
      }

      case 'tom': {
        const shellGeo = new THREE.CylinderGeometry(drum.radius, drum.radius*0.92, drum.height, 32);
        const shellMat = createDrumMaterial(drum.color === 0x06b6d4 ? 0x06b6d4 : drum.color === 0x10b981 ? 0x10b981 : 0xf59e0b, 0.3, 0.5);
        const shell = new THREE.Mesh(shellGeo, shellMat);
        shell.castShadow = true;
        shell.receiveShadow = true;
        group.add(shell);

        const headGeo = new THREE.CircleGeometry(drum.radius, 32);
        const headMat = createDrumMaterial(0xeeeeee, 0.25, 0.05);
        const head = new THREE.Mesh(headGeo, headMat);
        head.rotation.x = -Math.PI/2;
        head.position.y = drum.height/2 + 0.01;
        group.add(head);

        const rimGeo = new THREE.TorusGeometry(drum.radius, 0.025, 8, 48);
        const rimMat = createDrumMaterial(0xcccccc, 0.15, 0.9);
        const rimMesh = new THREE.Mesh(rimGeo, rimMat);
        rimMesh.rotation.x = Math.PI/2;
        rimMesh.position.y = drum.height/2;
        group.add(rimMesh);

        // Mount arm
        if(drum.id === 'tom1' || drum.id === 'tom2'){
          const armGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.8, 6);
          const armMat = createDrumMaterial(0x888888, 0.3, 0.8);
          const arm = new THREE.Mesh(armGeo, armMat);
          arm.position.y = -drum.height/2 - 0.4;
          group.add(arm);
        }

        // Lugs
        for(let i=0;i<6;i++){
          const lugGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.15, 6);
          const lugMat = createDrumMaterial(0xcccccc, 0.2, 0.9);
          const lug = new THREE.Mesh(lugGeo, lugMat);
          const a = (i/6)*Math.PI*2;
          lug.position.set(Math.cos(a)*(drum.radius+0.04), 0, Math.sin(a)*(drum.radius+0.04));
          group.add(lug);
        }

        mesh = head;
        break;
      }

      case 'cymbal': {
        // Stand
        const poleGeo = new THREE.CylinderGeometry(0.025, 0.025, drum.pos[1]+0.3, 8);
        const poleMat = createDrumMaterial(0x888888, 0.3, 0.7);
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.y = -(drum.pos[1]+0.3)/2;
        group.add(pole);

        // Base
        for(let i=0;i<3;i++){
          const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.7, 6);
          const leg = new THREE.Mesh(legGeo, poleMat);
          const a = (i/3)*Math.PI*2 + 0.3;
          leg.position.set(Math.cos(a)*0.35, -drum.pos[1]-0.05, Math.sin(a)*0.35);
          leg.rotation.x = 0.5;
          leg.rotation.y = a;
          group.add(leg);
        }

        // Cymbal
        const cymGeo = new THREE.CylinderGeometry(drum.radius, drum.radius*0.3, drum.height, 48);
        const cymMat = createDrumMaterial(drum.color, 0.15, 0.9);
        const cym = new THREE.Mesh(cymGeo, cymMat);
        cym.castShadow = true;
        group.add(cym);

        // Bell
        const bellGeo = new THREE.SphereGeometry(0.12, 16, 16, 0, Math.PI*2, 0, Math.PI/2);
        const bellMat = createDrumMaterial(0xdddddd, 0.15, 0.9);
        const bell = new THREE.Mesh(bellGeo, bellMat);
        bell.position.y = drum.height/2 + 0.02;
        group.add(bell);

        // Wing nut
        const nutGeo = new THREE.CylinderGeometry(0.04, 0.03, 0.06, 6);
        const nutMat = createDrumMaterial(0xcccccc, 0.2, 0.9);
        const nut = new THREE.Mesh(nutGeo, nutMat);
        nut.position.y = drum.height/2 + 0.08;
        group.add(nut);

        mesh = cym;
        break;
      }
    }

    group.position.set(...drum.pos);
    group.userData = {drumId: drum.id, type: drum.type, baseScale: 1};
    scene.add(group);
    drumMeshes[drum.id] = {group, mesh, drum};
  });
}

  for(let i=0;i<3;i++){

// ===== INTERACTION =====
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let hoveredDrum = null;

function getIntersectedDrum(event){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left)/rect.width)*2-1;
  mouse.y = -((event.clientY - rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  Object.values(drumMeshes).forEach(d => {
    d.group.traverse(child => {
      if(child.isMesh) meshes.push(child);
    });
  });
  const hits = raycaster.intersectObjects(meshes);
  if(hits.length > 0){
    let obj = hits[0].object;
    while(obj.parent && !obj.userData.drumId) obj = obj.parent;
    if(obj.userData.drumId) return obj.userData.drumId;
  }
  return null;
}

renderer && renderer.domElement.addEventListener('mousemove', (e) => {
  if(!renderer) return;
  const id = getIntersectedDrum(e);
  const tooltip = document.getElementById('tooltip');
  if(id){
    const drum = DRUMS.find(d=>d.id===id);
    tooltip.textContent = drum.name + ' [' + (drum.key === 'Space' ? 'Space' : drum.key.replace('Key','')) + ']';
    tooltip.style.left = (e.clientX+15)+'px';
    tooltip.style.top = (e.clientY-10)+'px';
    tooltip.style.opacity = '1';
    document.body.style.cursor = 'pointer';
    hoveredDrum = id;
  } else {
    tooltip.style.opacity = '0';
    document.body.style.cursor = 'default';
    hoveredDrum = null;
  }
});

document.getElementById('canvas-container').addEventListener('click', (e) => {
  if(!renderer) return;
  const id = getIntersectedDrum(e);
  if(id) triggerDrum(id);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if(e.repeat) return;
  const id = KEY_MAP[e.code];
  if(id){
    e.preventDefault();
    triggerDrum(id);
    // highlight key badge
    const badge = document.querySelector(`.key-badge[data-key="${e.code}"]`);
    if(badge) badge.classList.add('hit');
  }
});

document.addEventListener('keyup', (e) => {
  const badge = document.querySelector(`.key-badge[data-key="${e.code}"]`);
  if(badge) badge.classList.remove('hit');
});

function triggerDrum(id){
  const drumData = drumMeshes[id];
  if(!drumData) return;
  const drum = drumData.drum;

  playDrumSound(drum.type);
  hitCount++;
  document.getElementById('hitCount').textContent = hitCount;
  document.getElementById('lastNote').textContent = drum.name;

  // Animate
  animateHit(drumData);

  // Flash
  const flash = document.getElementById('flash');
  const hexColor = '#'+drum.color.toString(16).padStart(6,'0');
  flash.style.background = `radial-gradient(circle at 50% 50%, ${hexColor}33 0%, transparent 70%)`;
  flash.style.opacity = '1';
  setTimeout(()=>flash.style.opacity='0', 80);

  // Record
  if(isRecording){
    recordedNotes.push({time: Date.now()-recordStart, id, type: drum.type});
  }
}

function animateHit(drumData){
  const group = drumData.group;
  const origY = group.position.y;
  const startTime = performance.now();

  function anim(now){
    const t = (now - startTime)/300;
    if(t > 1){
      group.position.y = origY;
      group.scale.set(1,1,1);
      return;
    }
    const bounce = Math.sin(t*Math.PI)*0.15;
    group.position.y = origY + bounce;
    const s = 1 + Math.sin(t*Math.PI)*0.08;
    group.scale.set(s, s, s);
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);

  // Cymbal wobble
  if(drumData.drum.type === 'cymbal' || drumData.drum.type === 'hihat'){
    const startRot = performance.now();
    function wobble(now){
      const t = (now-startRot)/600;
      if(t>1){group.rotation.z=0;group.rotation.x=0;return;}
      group.rotation.z = Math.sin(t*Math.PI*4)*0.05*(1-t);
      group.rotation.x = Math.sin(t*Math.PI*3)*0.03*(1-t);
      requestAnimationFrame(wobble);
    }
    requestAnimationFrame(wobble);
  }
}

// ===== RECORDING =====
let isRecording = false;
let recordedNotes = [];
let recordStart = 0;

function toggleRecord(){
  if(isRecording){
    isRecording = false;
    document.getElementById('btnRecord').classList.remove('active');
    document.getElementById('btnRecord').textContent = '⏺ Запись';
  } else {
    recordedNotes = [];
    recordStart = Date.now();
    isRecording = true;
    document.getElementById('btnRecord').classList.add('active');
    document.getElementById('btnRecord').textContent = '⏹ Стоп';
  }
}
window.toggleRecord = toggleRecord;

function playRecorded(){
  if(recordedNotes.length === 0) return;
  recordedNotes.forEach(note => {
    setTimeout(()=>triggerDrum(note.id), note.time);
  });
}
window.playRecorded = playRecorded;

// ===== METRONOME =====
let metronomeOn = false;
let metronomeInterval = null;
let bpm = 120;

function changeBpm(delta){
  bpm = Math.max(40, Math.min(240, bpm+delta));
  document.getElementById('bpmValue').textContent = bpm;
  if(metronomeOn){
    clearInterval(metronomeInterval);
    metronomeInterval = setInterval(metronomeTick, 60000/bpm);
  }
}
window.changeBpm = changeBpm;

function toggleMetronome(){
  metronomeOn = !metronomeOn;
  const btn = document.getElementById('btnMetro');
  if(metronomeOn){
    btn.classList.add('active');
    btn.textContent = '⏹ Стоп';
    metronomeTick();
    metronomeInterval = setInterval(metronomeTick, 60000/bpm);
  } else {
    btn.classList.remove('active');
    btn.textContent = '▶ Метроном';
    clearInterval(metronomeInterval);
  }
}
window.toggleMetronome = toggleMetronome;

function metronomeTick(){
  if(!audioCtx) initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 1000;
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t+0.06);
}

// ===== SEQUENCER =====
const SEQ_DRUMS = ['kick','snare','hihat','tom1','tom2','floor','crash','ride'];
let pattern = {};
let seqPlaying = false;
let seqStep = 0;
let seqInterval = null;

SEQ_DRUMS.forEach(d => pattern[d] = new Array(16).fill(false));

function buildPatternGrid(){
  const grid = document.getElementById('patternGrid');
  grid.innerHTML = '';
  // Headers
  grid.appendChild(Object.assign(document.createElement('div'),{className:'pattern-label'}));
  for(let i=0;i<16;i++){
    const h = document.createElement('div');
    h.className = 'pattern-header';
    h.textContent = i+1;
    grid.appendChild(h);
  }
  // Rows
  SEQ_DRUMS.forEach(dId => {
    const drum = DRUMS.find(d=>d.id===dId);
    const label = document.createElement('div');
    label.className = 'pattern-label';
    label.textContent = drum.name.split(' ')[0];
    grid.appendChild(label);
    for(let i=0;i<16;i++){
      const cell = document.createElement('div');
      cell.className = 'pattern-cell' + (pattern[dId][i]?' active':'');
      cell.dataset.drum = dId;
      cell.dataset.step = i;
      cell.addEventListener('click', ()=>{
        pattern[dId][i] = !pattern[dId][i];
        cell.classList.toggle('active');
      });
      grid.appendChild(cell);
    }
  });
}

function clearPattern(){
  SEQ_DRUMS.forEach(d => pattern[d].fill(false));
  buildPatternGrid();
}
window.clearPattern = clearPattern;

function randomizePattern(){
  SEQ_DRUMS.forEach(d => {
    for(let i=0;i<16;i++){
      pattern[d][i] = Math.random() < (d==='kick'?0.3:d==='hihat'?0.5:0.15);
    }
  });
  buildPatternGrid();
}
window.randomizePattern = randomizePattern;

function toggleSequencer(){
  seqPlaying = !seqPlaying;
  const btn = document.getElementById('btnSeqPlay');
  if(seqPlaying){
    btn.textContent = '⏹ Стоп';
    btn.classList.add('active');
    seqStep = 0;
    seqInterval = setInterval(seqTick, 60000/bpm/4);
  } else {
    btn.textContent = '▶ Старт';
    btn.classList.remove('active');
    clearInterval(seqInterval);
    clearStepHighlight();
  }
}
window.toggleSequencer = toggleSequencer;

function seqTick(){
  clearStepHighlight();
  SEQ_DRUMS.forEach(dId => {
    if(pattern[dId][seqStep]){
      triggerDrum(dId);
    }
  });
  // highlight current step
  const cells = document.querySelectorAll(`.pattern-cell[data-step="${seqStep}"]`);
  cells.forEach(c => c.classList.add('current'));
  seqStep = (seqStep+1)%16;
}

function clearStepHighlight(){
  document.querySelectorAll('.pattern-cell.current').forEach(c=>c.classList.remove('current'));
}

function togglePatternPanel(){
  document.getElementById('pattern-panel').classList.toggle('visible');
  buildPatternGrid();
}
window.togglePatternPanel = togglePatternPanel;

// ===== UI INIT =====
function buildKeyBadges(){
  const container = document.getElementById('keys-hint');
  container.innerHTML = '';
  DRUMS.forEach(drum => {
    const badge = document.createElement('div');
    badge.className = 'key-badge';
    badge.dataset.key = drum.key;
    const keyLabel = drum.key === 'Space' ? 'Space' : drum.key.replace('Key','');
    badge.innerHTML = `<span class="key">${keyLabel}</span><span class="label">${drum.name}</span>`;
    container.appendChild(badge);
  });
}

// ===== ANIMATION LOOP =====
let prevTime = 0;

function animate(time){
  requestAnimationFrame(animate);

  // FPS
  frameCount++;
  if(time - lastFpsTime > 1000){
    document.getElementById('fpsCounter').textContent = frameCount;
    frameCount = 0;
    lastFpsTime = time;
  }

  controls.update();

  // Gentle idle animation for particles
  scene.traverse(obj => {
    if(obj.isPoints){
      const pos = obj.geometry.attributes.position;
      for(let i=0;i<pos.count;i++){
        pos.setY(i, pos.getY(i)+Math.sin(time*0.001+i)*0.001);
      }
      pos.needsUpdate = true;
    }
  });

  renderer.render(scene, camera);
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ===== INIT =====
function init(){
  initScene();
  buildKeyBadges();
  buildPatternGrid();

  // Hide loading
  setTimeout(()=>{
    document.getElementById('loadingScreen').classList.add('hidden');
  }, 800);

  animate(0);
}

// Wait for THREE to load
if(typeof THREE !== 'undefined'){
  init();
} else {
  window.addEventListener('load', init);
}

})();
</script>
