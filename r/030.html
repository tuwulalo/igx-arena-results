<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird 3D</title>
<style>
  :root{
    --accent:#ffd24a;
    --accent2:#ff8a3d;
    --panel:rgba(16,22,40,.82);
    --glass:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0e1a;font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;color:#fff}
  #app{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* HUD */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column}
  #topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px;gap:12px}
  .pill{
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--glass);border-radius:16px;
    padding:10px 16px;box-shadow:0 8px 28px rgba(0,0,0,.35);
  }
  #scoreWrap{display:flex;align-items:baseline;gap:10px}
  #score{font-size:46px;font-weight:800;letter-spacing:1px;
    background:linear-gradient(180deg,#fff,var(--accent));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 2px 0 rgba(0,0,0,.15);line-height:1}
  #scoreLbl{font-size:12px;text-transform:uppercase;letter-spacing:2px;opacity:.7;font-weight:700}
  #bestPill{font-size:14px;font-weight:700}
  #bestPill b{color:var(--accent)}

  /* Center overlays */
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{
    pointer-events:auto;width:min(92vw,440px);
    background:var(--panel);backdrop-filter:blur(16px);
    border:1px solid var(--glass);border-radius:26px;
    padding:34px 30px;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    animation:pop .45s cubic-bezier(.2,1.2,.3,1) both;
  }
  @keyframes pop{from{transform:translateY(18px) scale(.94);opacity:0}to{transform:none;opacity:1}}
  .logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
  .logo .b{font-size:40px}
  h1{font-size:34px;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:.6;font-weight:700;margin-bottom:22px}
  .desc{font-size:15px;line-height:1.55;opacity:.85;margin-bottom:24px}
  .stats{display:flex;gap:12px;margin-bottom:24px}
  .stat{flex:1;background:var(--glass);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px 8px}
  .stat .v{font-size:30px;font-weight:800;color:var(--accent)}
  .stat .k{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.6;font-weight:700;margin-top:2px}
  .btn{
    pointer-events:auto;display:inline-flex;align-items:center;justify-content:center;gap:10px;
    width:100%;border:none;cursor:pointer;font-family:inherit;
    font-size:18px;font-weight:800;letter-spacing:.5px;color:#241500;
    padding:16px 22px;border-radius:16px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));
    box-shadow:0 12px 30px rgba(255,138,61,.4),inset 0 1px 0 rgba(255,255,255,.5);
    transition:transform .12s ease,box-shadow .12s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(255,138,61,.5),inset 0 1px 0 rgba(255,255,255,.5)}
  .btn:active{transform:translateY(1px) scale(.99)}
  .hint{margin-top:18px;font-size:13px;opacity:.55;line-height:1.5}
  kbd{background:var(--glass);border:1px solid rgba(255,255,255,.15);border-bottom-width:2px;border-radius:6px;padding:2px 8px;font-family:inherit;font-size:12px;font-weight:700}
  .hidden{display:none!important}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s}

  /* Bottom tip */
  #tip{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;padding:0 0 20px}
  #tip .pill{font-size:13px;opacity:.8;display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0e1a;z-index:50}
  .spin{width:46px;height:46px;border-radius:50%;border:4px solid rgba(255,255,255,.12);border-top-color:var(--accent);animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div id="topbar">
    <div class="pill" id="scoreWrap">
      <div>
        <div id="scoreLbl">Очки</div>
        <div id="score">0</div>
      </div>
    </div>
    <div class="pill" id="bestPill">Рекорд: <b id="best">0</b></div>
  </div>

  <div id="overlay">
    <!-- Start card -->
    <div class="card" id="startCard">
      <div class="logo"><span class="b">🐦</span></div>
      <h1>FLAPPY BIRD</h1>
      <div class="sub">3D Edition</div>
      <p class="desc">Проведи птичку сквозь зазоры между трубами. Каждое касание — прыжок вверх. Не задень трубы и землю!</p>
      <button class="btn" id="startBtn">▶ Играть</button>
      <div class="hint">Клик / Тап / <kbd>Space</kbd> — взмах крыльями</div>
    </div>

    <!-- Game over card -->
    <div class="card hidden" id="overCard">
      <div class="logo"><span class="b">💥</span></div>
      <h1 id="overTitle">Игра окончена</h1>
      <div class="sub">Попробуй снова</div>
      <div class="stats">
        <div class="stat"><div class="v" id="finalScore">0</div><div class="k">Очки</div></div>
        <div class="stat"><div class="v" id="finalBest">0</div><div class="k">Рекорд</div></div>
      </div>
      <button class="btn" id="retryBtn">↻ Заново</button>
      <div class="hint">Клик / Тап / <kbd>Space</kbd> для рестарта</div>
    </div>
  </div>

  <div id="tip" class="hidden">
    <div class="pill"><span class="dot"></span> Тапай, чтобы взлететь</div>
  </div>
</div>

<div id="flash"></div>
<div id="loader"><div class="spin"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  // ---------- Config ----------
  const CFG = {
    gravity: -34,
    flap: 11.5,
    forwardSpeed: 8.5,
    gapHalf: 2.45,       // half of vertical gap
    pipeRadius: 0.95,
    pipeSpacing: 6.2,    // distance between pipe pairs along X
    pipeRangeY: 3.4,     // random vertical offset range
    floorY: -6.2,
    ceilY: 9.2,
    birdRadius: 0.62,
    numPipes: 6,
  };

  const $ = id => document.getElementById(id);

  // ---------- Three.js setup ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x6fc6ff);
  scene.fog = new THREE.Fog(0x9ad7ff, 28, 70);

  const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 200);
  camera.position.set(-6, 1.5, 13);

  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  $('app').appendChild(renderer.domElement);

  // ---------- Lights ----------
  const hemi = new THREE.HemisphereLight(0xffffff, 0x4a7a3a, 0.9);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xfff2d0, 1.25);
  sun.position.set(-12, 22, 16);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left=-40; sun.shadow.camera.right=40;
  sun.shadow.camera.top=40; sun.shadow.camera.bottom=-40;
  sun.shadow.camera.near=1; sun.shadow.camera.far=80;
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0xffffff,0.25));

  // ---------- Sky clouds ----------
  const cloudGroup = new THREE.Group();
  scene.add(cloudGroup);
  const cloudMat = new THREE.MeshLambertMaterial({color:0xffffff});
  function makeCloud(x,y,z,s){
    const g = new THREE.Group();
    const geo = new THREE.SphereGeometry(1,10,10);
    const parts=[[0,0,0,1.4],[1.3,-.2,0,1],[-1.3,-.2,.2,.9],[.5,.5,-.3,.8],[-.6,.4,.3,.7]];
    parts.forEach(p=>{
      const m=new THREE.Mesh(geo,cloudMat);
      m.position.set(p[0],p[1],p[2]);m.scale.setScalar(p[3]);
      g.add(m);
    });
    g.position.set(x,y,z);g.scale.setScalar(s);
    g.userData.speed = 0.15+Math.random()*0.25;
    cloudGroup.add(g);
    return g;
  }
  for(let i=0;i<14;i++){
    makeCloud(-40+Math.random()*120, 6+Math.random()*12, -18-Math.random()*22, 0.8+Math.random()*1.6);
  }

  // ---------- Ground ----------
  const groundMat = new THREE.MeshLambertMaterial({color:0x5fbf4f});
  const ground = new THREE.Mesh(new THREE.BoxGeometry(400, 4, 60), groundMat);
  ground.position.set(0, CFG.floorY-2, -6);
  ground.receiveShadow = true;
  scene.add(ground);

  // darker grass strip on top
  const strip = new THREE.Mesh(new THREE.BoxGeometry(400,0.5,60), new THREE.MeshLambertMaterial({color:0x4aa83f}));
  strip.position.set(0, CFG.floorY+0.1, -6);
  strip.receiveShadow=true;
  scene.add(strip);

  // decorative bushes on ground
  const bushMat=new THREE.MeshLambertMaterial({color:0x3f9a36});
  const bushGroup=new THREE.Group();scene.add(bushGroup);
  for(let i=0;i<40;i++){
    const b=new THREE.Mesh(new THREE.SphereGeometry(0.6+Math.random()*0.7,8,8),bushMat);
    b.position.set(-50+Math.random()*160, CFG.floorY+0.3, 4+Math.random()*10);
    b.scale.y=0.7;b.castShadow=true;b.receiveShadow=true;
    b.userData.bush=true;
    bushGroup.add(b);
  }

  // ---------- Bird ----------
  const bird = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({color:0xffd24a,roughness:0.5,metalness:0.05});
  const body = new THREE.Mesh(new THREE.SphereGeometry(CFG.birdRadius,24,24), bodyMat);
  body.scale.set(1.1,1,1.05);
  body.castShadow=true;
  bird.add(body);

  // belly
  const belly=new THREE.Mesh(new THREE.SphereGeometry(CFG.birdRadius*0.78,20,20),new THREE.MeshStandardMaterial({color:0xfff0c0,roughness:.6}));
  belly.position.set(0.05,-0.16,0.18);belly.scale.set(1,0.9,0.8);
  bird.add(belly);

  // wings
  const wingMat=new THREE.MeshStandardMaterial({color:0xff8a3d,roughness:.5});
  function makeWing(side){
    const w=new THREE.Mesh(new THREE.SphereGeometry(0.42,12,12),wingMat);
    w.scale.set(0.35,0.7,1.0);
    w.position.set(0,-0.02,side*0.55);
    w.castShadow=true;
    return w;
  }
  const wingL=makeWing(1), wingR=makeWing(-1);
  bird.add(wingL);bird.add(wingR);

  // beak
  const beak=new THREE.Mesh(new THREE.ConeGeometry(0.22,0.55,12),new THREE.MeshStandardMaterial({color:0xff5a2a,roughness:.4}));
  beak.rotation.z=-Math.PI/2;beak.position.set(0.72,-0.05,0);
  beak.castShadow=true;
  bird.add(beak);

  // eyes
  const eyeWhiteMat=new THREE.MeshStandardMaterial({color:0xffffff});
  const pupilMat=new THREE.MeshStandardMaterial({color:0x102030});
  [[-0.18],[0.18]].forEach((zz,i)=>{
    const z = i===0? 0.28 : -0.28;
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.18,14,14),eyeWhiteMat);
    ew.position.set(0.4,0.22,z);
    bird.add(ew);
    const pu=new THREE.Mesh(new THREE.SphereGeometry(0.09,12,12),pupilMat);
    pu.position.set(0.54,0.22,z);
    bird.add(pu);
  });

  bird.position.set(0,0,0);
  scene.add(bird);

  // ---------- Pipes ----------
  const pipeMat = new THREE.MeshStandardMaterial({color:0x2fbf5f,roughness:0.45,metalness:0.05});
  const pipeCapMat = new THREE.MeshStandardMaterial({color:0x27a852,roughness:0.4});
  const pipeGeo = new THREE.CylinderGeometry(CFG.pipeRadius, CFG.pipeRadius, 1, 24);
  const capGeo = new THREE.CylinderGeometry(CFG.pipeRadius*1.18, CFG.pipeRadius*1.18, 0.7, 24);

  function buildPipe(){
    const grp = new THREE.Group();
    const topLen = 20, botLen = 20;

    const top = new THREE.Mesh(pipeGeo, pipeMat);
    top.scale.y = topLen; top.castShadow=true; top.receiveShadow=true;
    top.userData.part='top';
    const topCap = new THREE.Mesh(capGeo, pipeCapMat); topCap.castShadow=true;
    topCap.userData.part='topcap';

    const bot = new THREE.Mesh(pipeGeo, pipeMat);
    bot.scale.y = botLen; bot.castShadow=true; bot.receiveShadow=true;
    bot.userData.part='bot';
    const botCap = new THREE.Mesh(capGeo, pipeCapMat); botCap.castShadow=true;
    botCap.userData.part='botcap';

    grp.add(top,topCap,bot,botCap);
    grp.userData = {topLen, botLen, passed:false, gapY:0};
    scene.add(grp);
    return grp;
  }

  const pipes = [];
  for(let i=0;i<CFG.numPipes;i++) pipes.push(buildPipe());

  function layoutPipe(p, x){
    const gapY = (Math.random()*2-1)*CFG.pipeRangeY;
    p.userData.gapY = gapY;
    p.userData.passed = false;
    p.position.x = x;
    const top = p.children[0], topCap=p.children[1], bot=p.children[2], botCap=p.children[3];
    // top pipe goes from gapY+gapHalf upward
    const topStart = gapY + CFG.gapHalf;
    top.position.set(0, topStart + p.userData.topLen/2, 0);
    topCap.position.set(0, topStart, 0);
    const botStart = gapY - CFG.gapHalf;
    bot.position.set(0, botStart - p.userData.botLen/2, 0);
    botCap.position.set(0, botStart, 0);
  }

  // ---------- Game state ----------
  const STATE = {READY:0, PLAYING:1, DEAD:2};
  let state = STATE.READY;
  let vy = 0;            // bird vertical velocity
  let score = 0;
  let best = +(localStorage.getItem('flappy3d_best')||0);
  let wingPhase = 0;
  let flapImpulse = 0;
  let shakeT = 0;
  const clock = new THREE.Clock();

  $('best').textContent = best;

  function resetWorld(){
    bird.position.set(0,0,0);
    bird.rotation.set(0,0,0);
    vy = 0; score=0; flapImpulse=0; shakeT=0;
    $('score').textContent = 0;
    // place pipes ahead
    let startX = 9;
    for(let i=0;i<pipes.length;i++){
      layoutPipe(pipes[i], startX + i*CFG.pipeSpacing);
    }
  }

  function flap(){
    if(state===STATE.READY){ startGame(); return; }
    if(state===STATE.DEAD){ return; }
    vy = CFG.flap;
    flapImpulse = 1;
  }

  function startGame(){
    resetWorld();
    state = STATE.PLAYING;
    $('startCard').classList.add('hidden');
    $('overCard').classList.add('hidden');
    $('tip').classList.remove('hidden');
    vy = CFG.flap*0.6;
  }

  function gameOver(){
    if(state===STATE.DEAD) return;
    state = STATE.DEAD;
    shakeT = 0.5;
    flashScreen();
    if(score>best){ best=score; localStorage.setItem('flappy3d_best',best); }
    $('best').textContent = best;
    $('finalScore').textContent = score;
    $('finalBest').textContent = best;
    $('overTitle').textContent = score>0 && score>=best && score>0 ? 'Новый рекорд!' : 'Игра окончена';
    $('tip').classList.add('hidden');
    setTimeout(()=> $('overCard').classList.remove('hidden'), 420);
  }

  const flashEl = $('flash');
  function flashScreen(){
    flashEl.style.opacity='0.55';
    setTimeout(()=>flashEl.style.opacity='0',90);
  }

  // ---------- Input ----------
  function onTap(e){
    if(e && e.target && e.target.closest && e.target.closest('.btn')) return; // let buttons work
    flap();
  }
  window.addEventListener('mousedown', onTap);
  window.addEventListener('touchstart', e=>{ e.preventDefault(); onTap(e); }, {passive:false});
  window.addEventListener('keydown', e=>{
    if(e.code==='Space'||e.code==='ArrowUp'){
      e.preventDefault();
      if(state===STATE.DEAD){ startGame(); }
      else flap();
    }
  });

  $('startBtn').addEventListener('click', e=>{ e.stopPropagation(); startGame(); });
  $('retryBtn').addEventListener('click', e=>{ e.stopPropagation(); startGame(); });

  window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ---------- Collision ----------
  function checkCollision(){
    const bx = bird.position.x, by = bird.position.y;
    const r = CFG.birdRadius;
    // floor / ceiling
    if(by - r <= CFG.floorY+0.2) return true;
    if(by + r >= CFG.ceilY) { bird.position.y = CFG.ceilY - r; vy = Math.min(vy,0); }

    for(const p of pipes){
      const dx = Math.abs(p.position.x - bx);
      // horizontal overlap (cylinder radius + bird radius), assume z~0
      if(dx < CFG.pipeRadius + r*0.9){
        const gapY = p.userData.gapY;
        // gap spans [gapY-gapHalf, gapY+gapHalf]
        if(by + r*0.85 > gapY + CFG.gapHalf || by - r*0.85 < gapY - CFG.gapHalf){
          return true;
        }
      }
    }
    return false;
  }

  // ---------- Loop ----------
  function animate(){
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    dt = Math.min(dt, 0.033); // clamp

    // clouds drift
    cloudGroup.children.forEach(c=>{
      c.position.x -= c.userData.speed*dt*2;
      if(c.position.x < bird.position.x-60) c.position.x += 130;
    });

    wingPhase += dt*(state===STATE.PLAYING?18:8);

    if(state===STATE.PLAYING){
      vy += CFG.gravity*dt;
      bird.position.y += vy*dt;

      // move world: bird advances; we move pipes/ground relative by moving camera & bird forward
      const adv = CFG.forwardSpeed*dt;
      bird.position.x += adv;

      // recycle pipes & scoring
      let maxX = -Infinity;
      pipes.forEach(p=>{ if(p.position.x>maxX) maxX=p.position.x; });
      pipes.forEach(p=>{
        if(!p.userData.passed && p.position.x < bird.position.x - 0.1){
          p.userData.passed = true;
          score++;
          $('score').textContent = score;
          bumpScore();
        }
        if(p.position.x < bird.position.x - 12){
          layoutPipe(p, maxX + CFG.pipeSpacing);
          maxX = p.position.x;
        }
      });

      if(checkCollision()) gameOver();
    } else if(state===STATE.READY){
      // gentle bob
      bird.position.y = Math.sin(performance.now()*0.003)*0.5;
    } else if(state===STATE.DEAD){
      // fall down
      vy += CFG.gravity*dt;
      bird.position.y += vy*dt;
      if(bird.position.y < CFG.floorY+CFG.birdRadius){
        bird.position.y = CFG.floorY+CFG.birdRadius;
        vy=0;
      }
      bird.rotation.z = Math.max(bird.rotation.z - dt*4, -Math.PI/2);
    }

    // bird tilt based on velocity (when alive)
    if(state!==STATE.DEAD){
      const targetTilt = THREE.MathUtils.clamp(vy*0.045, -0.5, 0.6);
      bird.rotation.z += (targetTilt - bird.rotation.z)*Math.min(1,dt*10);
      bird.rotation.y = 0;
    }

    // wing flap animation
    flapImpulse = Math.max(0, flapImpulse - dt*3);
    const wf = Math.sin(wingPhase)*0.5 + flapImpulse*0.9;
    wingL.rotation.x = -wf - 0.2;
    wingR.rotation.x = wf + 0.2;

    // camera follows bird along X, smooth Y
    const camTargetX = bird.position.x - 6;
    camera.position.x += (camTargetX - camera.position.x)*Math.min(1,dt*6);
    const camTargetY = THREE.MathUtils.clamp(bird.position.y*0.35 + 1.2, -2, 4);
    camera.position.y += (camTargetY - camera.position.y)*Math.min(1,dt*4);

    // screen shake on death
    if(shakeT>0){
      shakeT -= dt;
      const s = shakeT*0.6;
      camera.position.x += (Math.random()*2-1)*s;
      camera.position.y += (Math.random()*2-1)*s;
    }
    camera.lookAt(bird.position.x+1, bird.position.y*0.5, 0);

    // recycle bushes
    bushGroup.children.forEach(b=>{
      if(b.position.x < bird.position.x-50) b.position.x += 160;
    });

    renderer.render(scene, camera);
  }

  // score bump animation
  const scoreEl = $('score');
  function bumpScore(){
    scoreEl.style.transition='none';
    scoreEl.style.transform='scale(1.35)';
    requestAnimationFrame(()=>{
      scoreEl.style.transition='transform .25s cubic-bezier(.2,1.4,.3,1)';
      scoreEl.style.transform='scale(1)';
    });
  }

  // ---------- Boot ----------
  resetWorld();
  state = STATE.READY;
  $('loader').classList.add('hidden');
  animate();

})();
</script>
</body>
</html>
