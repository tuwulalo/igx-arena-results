<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasker — элегантный список дел</title>
<style>
  :root {
    --bg-gradient-start: #6a5acd;
    --bg-gradient-end: #8e44ad;
    --surface: #ffffff;
    --surface-dim: #f7f7fb;
    --border: #ebeaf2;
    --text: #2d2b3d;
    --text-muted: #8a87a3;
    --text-faint: #b6b3c9;
    --primary: #6c5ce7;
    --primary-hover: #5a4bd1;
    --primary-soft: rgba(108, 92, 231, 0.12);
    --danger: #ff5b6e;
    --danger-soft: rgba(255, 91, 110, 0.12);
    --success: #18c29c;
    --success-soft: rgba(24, 194, 156, 0.14);
    --shadow-sm: 0 2px 8px rgba(45, 43, 61, 0.06);
    --shadow-md: 0 8px 24px rgba(45, 43, 61, 0.10);
    --shadow-lg: 0 24px 60px rgba(45, 43, 61, 0.18);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
  }

  html[data-theme="dark"] {
    --surface: #1f1d2e;
    --surface-dim: #16141f;
    --border: #2e2c41;
    --text: #ecebf5;
    --text-muted: #9b98b3;
    --text-faint: #6a6783;
    --primary: #a29bfe;
    --primary-hover: #8c83fd;
    --primary-soft: rgba(162, 155, 254, 0.16);
    --danger: #ff7a8a;
    --danger-soft: rgba(255, 122, 138, 0.16);
    --success: #2dd4bf;
    --success-soft: rgba(45, 212, 191, 0.18);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.55);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  *::selection {
    background: var(--primary-soft);
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #9b59b6 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    transition: background 0.4s ease;
    line-height: 1.5;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.15), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255, 255, 255, 0.10), transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #fff;
    padding: 4px 8px;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    display: grid;
    place-items: center;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    flex-shrink: 0;
  }

  .brand-icon svg {
    width: 28px;
    height: 28px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .brand-text h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
  }

  .brand-text p {
    font-size: 13px;
    opacity: 0.85;
    font-weight: 500;
    margin-top: 2px;
  }

  .theme-toggle {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: transform 0.25s ease, background 0.25s ease;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    transform: rotate(20deg) scale(1.05);
    background: rgba(255, 255, 255, 0.28);
  }

  .theme-toggle svg {
    width: 22px;
    height: 22px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .theme-toggle .icon-moon { display: none; }
  html[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  html[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

  /* ===== PROGRESS CARD ===== */
  .progress-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    box-shadow: var(--shadow-md);
    transition: background 0.3s ease;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .progress-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .progress-value span {
    color: var(--primary);
  }

  .progress-bar {
    height: 10px;
    background: var(--surface-dim);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #b39df9);
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ===== STATS ROW ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 16px 14px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid var(--border);
  }

  .stat:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .stat-num {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat:nth-child(1) .stat-num { color: var(--primary); }
  .stat:nth-child(2) .stat-num { color: #f5a623; }
  .stat:nth-child(3) .stat-num { color: var(--success); }

  .stat-name {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== MAIN CARD ===== */
  .card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transition: background 0.3s ease;
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    display: flex;
    gap: 10px;
    padding: 18px;
    border-bottom: 1px solid var(--border);
  }

  .input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 16px;
    width: 20px;
    height: 20px;
    color: var(--text-faint);
    pointer-events: none;
  }

  #todoInput {
    width: 100%;
    padding: 14px 16px 14px 46px;
    font-size: 15px;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-dim);
    color: var(--text);
    transition: border 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    outline: none;
  }

  #todoInput::placeholder {
    color: var(--text-faint);
  }

  #todoInput:focus {
    border-color: var(--primary);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--primary-soft);
  }

  .add-btn {
    padding: 0 20px;
    height: 50px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--primary);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    flex-shrink: 0;
  }

  .add-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px var(--primary-soft);
  }

  .add-btn:active {
    transform: translateY(0) scale(0.97);
  }

  .add-btn svg {
    width: 20px;
    height: 20px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.4;
    stroke-linecap: round;
  }

  /* ===== FILTERS ===== */
  .filters {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    gap: 4px;
    background: var(--surface-dim);
    padding: 4px;
    border-radius: var(--radius-sm);
  }

  .filter-btn {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-btn:hover {
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--surface);
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }

  .filter-count {
    font-size: 11px;
    background: var(--primary-soft);
    color: var(--primary);
    padding: 1px 6px;
    border-radius: 100px;
    font-weight: 700;
    min-width: 18px;
    text-align: center;
  }

  .filter-btn:not(.active) .filter-count {
    background: rgba(138, 135, 163, 0.15);
    color: var(--text-faint);
  }

  .clear-btn {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .clear-btn:hover {
    color: var(--danger);
    background: var(--danger-soft);
  }

  .clear-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .clear-btn svg {
    width: 15px;
    height: 15px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  /* ===== TODO LIST ===== */
  .todo-list {
    list-style: none;
    max-height: 480px;
    overflow-y: auto;
    padding: 8px;
  }

  .todo-list::-webkit-scrollbar {
    width: 8px;
  }
  .todo-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .todo-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 100px;
  }
  .todo-list::-webkit-scrollbar-thumb:hover {
    background: var(--text-faint);
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    border-radius: var(--radius-md);
    transition: background 0.2s ease, opacity 0.3s ease, transform 0.3s ease;
    position: relative;
    animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-8px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .todo-item:hover {
    background: var(--surface-dim);
  }

  .todo-item.removing {
    opacity: 0;
    transform: translateX(40px);
  }

  .todo-item.completing .todo-text {
    text-decoration: line-through;
    color: var(--text-faint);
  }

  /* custom checkbox */
  .check {
    position: relative;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .check input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    margin: 0;
    z-index: 2;
  }

  .check .box {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-radius: 8px;
    display: grid;
    place-items: center;
    transition: all 0.2s ease;
    background: var(--surface);
  }

  .check:hover .box {
    border-color: var(--primary);
  }

  .check .box svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 20;
    stroke-dashoffset: 20;
    transition: stroke-dashoffset 0.25s ease;
  }

  .check input:checked + .box {
    background: var(--success);
    border-color: var(--success);
  }

  .check input:checked + .box svg {
    stroke-dashoffset: 0;
  }

  .todo-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .todo-text {
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
    word-break: break-word;
    transition: color 0.2s ease;
    cursor: text;
    padding: 2px 0;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--text-faint);
  }

  .todo-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-faint);
    font-weight: 500;
  }

  .todo-meta .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-faint);
  }

  .todo-edit {
    flex: 1;
    padding: 6px 10px;
    font-size: 15px;
    font-family: inherit;
    border: 2px solid var(--primary);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    box-shadow: 0 0 0 4px var(--primary-soft);
    display: none;
  }

  .todo-item.editing .todo-content { display: none; }
  .todo-item.editing .todo-edit { display: block; }

  .priority-pill {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 2px 7px;
    border-radius: 100px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .priority-pill::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .priority-pill.high { color: #ff5b6e; background: rgba(255, 91, 110, 0.12); }
  .priority-pill.med { color: #f5a623; background: rgba(245, 166, 35, 0.14); }
  .priority-pill.low { color: #18c29c; background: rgba(24, 194, 156, 0.14); }

  .item-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .todo-item:hover .item-actions {
    opacity: 1;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    border-radius: 8px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s ease;
  }

  .icon-btn:hover {
    background: var(--surface);
    color: var(--primary);
  }

  .icon-btn.delete:hover {
    background: var(--danger-soft);
    color: var(--danger);
  }

  .icon-btn svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ===== EMPTY STATES ===== */
  .empty {
    padding: 50px 20px 60px;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .empty-illus {
    width: 88px;
    height: 88px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: var(--primary-soft);
    display: grid;
    place-items: center;
  }

  .empty-illus svg {
    width: 44px;
    height: 44px;
    stroke: var(--primary);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .empty h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .empty p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 280px;
    margin: 0 auto;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    color: rgba(255, 255, 255, 0.8);
    font-size: 12px;
    padding: 6px;
    font-weight: 500;
  }

  .footer kbd {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 5px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--surface);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  /* priority selector */
  .priority-select {
    display: flex;
    gap: 6px;
    padding: 0 18px 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .priority-select .ps-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-right: 2px;
  }

  .ps-btn {
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ps-btn::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .ps-btn[data-p="high"]::before { background: #ff5b6e; }
  .ps-btn[data-p="med"]::before { background: #f5a623; }
  .ps-btn[data-p="low"]::before { background: #18c29c; }

  .ps-btn.active[data-p="high"] { border-color: #ff5b6e; color: #ff5b6e; background: rgba(255, 91, 110, 0.10); }
  .ps-btn.active[data-p="med"] { border-color: #f5a623; color: #f5a623; background: rgba(245, 166, 35, 0.12); }
  .ps-btn.active[data-p="low"] { border-color: #18c29c; color: #18c29c; background: rgba(24, 194, 156, 0.10); }

  @media (max-width: 560px) {
    body { padding: 20px 14px; }
    .brand-text h1 { font-size: 22px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat { padding: 12px 8px; }
    .stat-num { font-size: 20px; }
    .add-btn span { display: none; }
    .add-btn { padding: 0 16px; }
    .filters { justify-content: center; }
    .input-area { padding: 14px; gap: 8px; }
    .item-actions { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="brand-text">
          <h1>Tasker</h1>
          <p id="dateLabel">Список ваших дел</p>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Сменить тему" aria-label="Сменить тему">
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <!-- PROGRESS -->
    <section class="progress-card">
      <div class="progress-top">
        <span class="progress-label">Общий прогресс</span>
        <span class="progress-value"><span id="progressPct">0%</span> · выполнено <span id="progressFrac">0 / 0</span></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <!-- STATS -->
    <section class="stats-row">
      <div class="stat">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-name">Всего</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statActive">0</div>
        <div class="stat-name">Активных</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-name">Готово</div>
      </div>
    </section>

    <!-- MAIN CARD -->
    <main class="card">
      <!-- INPUT -->
      <div class="input-area">
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          <input type="text" id="todoInput" placeholder="Что нужно сделать?" maxlength="200" autocomplete="off">
        </div>
        <button class="add-btn" id="addBtn">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          <span>Добавить</span>
        </button>
      </div>

      <!-- PRIORITY SELECTOR -->
      <div class="priority-select">
        <span class="ps-label">Приоритет:</span>
        <button class="ps-btn" data-p="low">Низкий</button>
        <button class="ps-btn active" data-p="med">Средний</button>
        <button class="ps-btn" data-p="high">Высокий</button>
      </div>

      <!-- FILTERS -->
      <div class="filters">
        <div class="filter-group" id="filterGroup">
          <button class="filter-btn active" data-filter="all">Все <span class="filter-count" id="cAll">0</span></button>
          <button class="filter-btn" data-filter="active">Активные <span class="filter-count" id="cActive">0</span></button>
          <button class="filter-btn" data-filter="done">Выполненные <span class="filter-count" id="cDone">0</span></button>
        </div>
        <button class="clear-btn" id="clearBtn" disabled>
          <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Очистить
        </button>
      </div>

      <!-- LIST -->
      <ul class="todo-list" id="todoList"></ul>
    </main>

    <footer class="footer">
      Двойной клик по задаче — редактировать · <kbd>Enter</kbd> добавить · данные хранятся локально
    </footer>
  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    <span id="toastMsg">Готово</span>
  </div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'tasker.todos.v1';
  const THEME_KEY = 'tasker.theme';
  const FILTER_KEY = 'tasker.filter';

  let todos = [];
  let currentFilter = localStorage.getItem(FILTER_KEY) || 'all';
  let selectedPriority = 'med';

  // ---- DOM refs ----
  const listEl = document.getElementById('todoList');
  const inputEl = document.getElementById('todoInput');
  const addBtn = document.getElementById('addBtn');
  const clearBtn = document.getElementById('clearBtn');
  const filterGroup = document.getElementById('filterGroup');
  const themeToggle = document.getElementById('themeToggle');
  const toastEl = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const progressFill = document.getElementById('progressFill');
  const progressPct = document.getElementById('progressPct');
  const progressFrac = document.getElementById('progressFrac');
  const dateLabel = document.getElementById('dateLabel');

  // ---- Utils ----
  const $ = (id) => document.getElementById(id);

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const priorityLabel = { high: 'Высокий', med: 'Средний', low: 'Низкий' };

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'только что';
    if (diff < 3600) return Math.floor(diff / 60) + ' мин назад';
    if (diff < 86400) return Math.floor(diff / 3600) + ' ч назад';
    const days = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
    return d.getDate() + ' ' + ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()] + ', ' + days[d.getDay()];
  }

  // ---- Storage ----
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      todos = raw ? JSON.parse(raw) : [];
    } catch (e) {
      todos = [];
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) {
      showToast('Не удалось сохранить', false);
    }
  }

  // ---- Toast ----
  let toastTimer;
  function showToast(msg, success = true) {
    toastMsg.textContent = msg;
    toastEl.querySelector('svg').style.stroke = success ? 'var(--success, #18c29c)' : 'var(--danger, #ff5b6e)';
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ---- Actions ----
  function addTodo(text) {
    text = text.trim();
    if (!text) {
      inputEl.focus();
      return false;
    }
    todos.unshift({
      id: uid(),
      text: text,
      done: false,
      priority: selectedPriority,
      createdAt: Date.now(),
      completedAt: null
    });
    save();
    render();
    showToast('Задача добавлена');
    return true;
  }

  function toggleTodo(id) {
    const t = todos.find(x => x.id === id);
    if (!t) return;
    t.done = !t.done;
    t.completedAt = t.done ? Date.now() : null;
    save();
    render();
  }

  function deleteTodo(id) {
    const li = listEl.querySelector('[data-id="' + id + '"]');
    if (li) {
      li.classList.add('removing');
      setTimeout(() => {
        todos = todos.filter(x => x.id !== id);
        save();
        render();
      }, 260);
    } else {
      todos = todos.filter(x => x.id !== id);
      save();
      render();
    }
    showToast('Задача удалена', false);
  }

  function editTodo(id, newText) {
    newText = newText.trim();
    const t = todos.find(x => x.id === id);
    if (!t) return;
    if (!newText) {
      deleteTodo(id);
      return;
    }
    t.text = newText;
    save();
    render();
  }

  function clearCompleted() {
    const count = todos.filter(t => t.done).length;
    if (count === 0) return;
    // animate removal
    const doneEls = listEl.querySelectorAll('.todo-item.done');
    doneEls.forEach(el => el.classList.add('removing'));
    setTimeout(() => {
      todos = todos.filter(t => !t.done);
      save();
      render();
      showToast('Очищено: ' + count + ' зад.');
    }, 260);
  }

  // ---- Filtering ----
  function getFiltered() {
    if (currentFilter === 'active') return todos.filter(t => !t.done);
    if (currentFilter === 'done') return todos.filter(t => t.done);
    return todos;
  }

  // ---- Render ----
  function render() {
    const filtered = getFiltered();
    listEl.innerHTML = '';

    if (filtered.length === 0) {
      listEl.appendChild(renderEmpty());
    } else {
      filtered.forEach(t => listEl.appendChild(renderItem(t)));
    }

    updateCounts();
    updateProgress();
  }

  function renderEmpty() {
    const wrap = document.createElement('li');
    wrap.className = 'empty';
    let icon, title, text;
    if (todos.length === 0) {
      icon = '<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
      title = 'Пока пусто';
      text = 'Добавьте первую задачу, чтобы начать. Напишите её в поле выше и нажмите «Добавить».';
    } else if (currentFilter === 'active') {
      icon = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>';
      title = 'Всё выполнено!';
      text = 'Нет активных задач. Отличная работа — можно отдохнуть.';
    } else if (currentFilter === 'done') {
      icon = '<svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>';
      title = 'Нет выполненных';
      text = 'Здесь появятся задачи, которые вы отметите как выполненные.';
    } else {
      icon = '<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
      title = 'Список пуст';
      text = 'Добавьте задачу, чтобы начать.';
    }
    wrap.innerHTML = '<div class="empty-illus">' + icon + '</div><h3>' + title + '</h3><p>' + text + '</p>';
    return wrap;
  }

  function renderItem(t) {
    const li = document.createElement('li');
    li.className = 'todo-item' + (t.done ? ' done' : '');
    li.dataset.id = t.id;

    const metaParts = ['<span>' + formatDate(t.createdAt) + '</span>'];
    if (t.priority) metaParts.push('<span class="priority-pill ' + t.priority + '">' + priorityLabel[t.priority] + '</span>');
    if (t.done && t.completedAt) metaParts.push('<span>✓ ' + formatDate(t.completedAt) + '</span>');

    li.innerHTML =
      '<label class="check">' +
        '<input type="checkbox" ' + (t.done ? 'checked' : '') + '>' +
        '<span class="box"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></span>' +
      '</label>' +
      '<div class="todo-content">' +
        '<div class="todo-text">' + escapeHtml(t.text) + '</div>' +
        '<div class="todo-meta">' + metaParts.join('<span class="dot"></span>') + '</div>' +
      '</div>' +
      '<input type="text" class="todo-edit" maxlength="200" value="' + escapeHtml(t.text) + '">' +
      '<div class="item-actions">' +
        '<button class="icon-btn edit" title="Редактировать" aria-label="Редактировать"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
        '<button class="icon-btn delete" title="Удалить" aria-label="Удалить"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
      '</div>';

    // checkbox
    li.querySelector('input[type=checkbox]').addEventListener('change', () => toggleTodo(t.id));
    // delete
    li.querySelector('.icon-btn.delete').addEventListener('click', () => deleteTodo(t.id));
    // edit (button)
    li.querySelector('.icon-btn.edit').addEventListener('click', () => startEdit(li, t.id));
    // edit (double click text)
    li.querySelector('.todo-text').addEventListener('dblclick', () => startEdit(li, t.id));

    return li;
  }

  function startEdit(li, id) {
    li.classList.add('editing');
    const input = li.querySelector('.todo-edit');
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);

    const commit = () => {
      li.classList.remove('editing');
      editTodo(id, input.value);
    };
    input.addEventListener('blur', commit, { once: true });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = li.querySelector('.todo-text').textContent; li.classList.remove('editing'); input.blur(); }
    });
  }

  // ---- Counts & Progress ----
  function updateCounts() {
    const total = todos.length;
    const done = todos.filter(t => t.done).length;
    const active = total - done;
    $('statTotal').textContent = total;
    $('statActive').textContent = active;
    $('statDone').textContent = done;
    $('cAll').textContent = total;
    $('cActive').textContent = active;
    $('cDone').textContent = done;
    clearBtn.disabled = done === 0;
  }

  function updateProgress() {
    const total = todos.length;
    const done = todos.filter(t => t.done).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressFill.style.width = pct + '%';
    progressPct.textContent = pct + '%';
    progressFrac.textContent = done + ' / ' + total;
  }

  // ---- Events ----
  addBtn.addEventListener('click', () => {
    if (addTodo(inputEl.value)) inputEl.value = '';
    inputEl.focus();
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (addTodo(inputEl.value)) inputEl.value = '';
    }
  });

  clearBtn.addEventListener('click', clearCompleted);

  filterGroup.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    localStorage.setItem(FILTER_KEY, currentFilter);
    filterGroup.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  // priority selector
  document.querySelectorAll('.ps-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPriority = btn.dataset.p;
      document.querySelectorAll('.ps-btn').forEach(b => b.classList.toggle('active', b === btn));
    });
  });

  // theme
  themeToggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
  });

  // ---- Init ----
  function setInitialTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  }

  function setDateLabel() {
    const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
    const now = new Date();
    dateLabel.textContent = days[now.getDay()] + ', ' + now.getDate() + ' ' + ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'][now.getMonth()];
  }

  // restore active filter button
  function syncFilterBtn() {
    filterGroup.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === currentFilter);
    });
  }

  setInitialTheme();
  setDateLabel();
  load();
  syncFilterBtn();

  // seed demo data on first run
  if (todos.length === 0 && !localStorage.getItem('tasker.seeded')) {
    const base = Date.now();
    todos = [
      { id: uid(), text: 'Изучить список дел Tasker — двойной клик для редактирования', done: false, priority: 'high', createdAt: base - 1000, completedAt: null },
      { id: uid(), text: 'Запланировать задачи на неделю с приоритетами', done: false, priority: 'med', createdAt: base - 2000, completedAt: null },
      { id: uid(), text: 'Попробовать тёмную тему — кнопка справа вверху', done: true, priority: 'low', createdAt: base - 3000, completedAt: base - 2500 }
    ];
    save();
    localStorage.setItem('tasker.seeded', '1');
  }

  render();
  inputEl.focus();
})();
</script>
</body>
</html>
