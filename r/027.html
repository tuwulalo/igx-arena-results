<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drum Studio</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #151520;
    --surface2: #1e1e2e;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcbff;
    --accent4: #c084fc;
    --text: #e0e0e0;
    --text2: #a0a0b0;
    --text3: #606075;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  #canvas-container { position:fixed; inset:0; z-index:1; }
  canvas { display:block; }

  #ui-overlay {
    position:fixed; inset:0; z-index:10; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;
  }

  #header {
    padding:20px 30px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:auto;
  }
  #header h1 {
    font-size:1.6rem; font-weight:800; letter-spacing:0.03em;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  #header .subtitle {
    font-size:0.7rem; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; margin-top:2px;
  }
  #info-panel {
    background:rgba(21,21,32,0.85); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08); border-radius:14px;
    padding:14px 20px; pointer-events:auto;
    display:flex; gap:30px; align-items:center;
  }
  #info-panel .stat { text-align:center; }
  #info-panel .stat-val { font-size:1.3rem; font-weight:700; color:var(--text); }
  #info-panel .stat-lbl { font-size:0.6rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
  #hit-indicator {
    font-size:0.85rem; font-weight:700; color:var(--accent2);
    opacity:0; transition:opacity 0.1s;
  }

  #bottom-bar {
    display:flex; justify-content:center; align-items:flex-end;
    padding:20px 30px; gap:12px; flex-wrap:wrap;
  }
  .key-hint {
    pointer-events:auto;
    background:rgba(21,21,32,0.8); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.06); border-radius:10px;
    padding:8px 14px; display:flex; align-items:center; gap:10px;
    transition:all 0.2s;
    cursor:pointer;
  }
  .key-hint:hover { border-color:rgba(255,255,255,0.18); background:rgba(30,30,46,0.9); }
  .key-hint .key-badge {
    width:28px; height:28px; border-radius:6px;
    background:var(--surface2); border:1px solid rgba(255,255,255,0.12);
    display:flex; align-items:center; justify-content:center;
    font-size:0.7rem; font-weight:700; color:var(--text2);
    letter-spacing:0.04em;
  }
  .key-hint .key-label { font-size:0.65rem; color:var(--text2); font-weight:600; letter-spacing:0.03em; text-transform:uppercase; }
  .key-hint.flash { border-color:var(--accent2); background:rgba(255,217,61,0.15); }
  .key-hint.flash .key-badge { background:var(--accent2); color:#000; border-color:var(--accent2); }
  .key-hint.flash .key-label { color:var(--accent2); }

  #tooltip {
    position:fixed; pointer-events:none; z-index:20;
    background:rgba(21,21,32,0.92); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.1); border-radius:8px;
    padding:6px 12px; font-size:0.7rem; color:var(--text); font-weight:600;
    opacity:0; transition:opacity 0.15s; transform:translate(-50%, -120%);
    white-space:nowrap;
  }

  #loading {
    position:fixed; inset:0; z-index:100; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity 0.5s;
  }
  #loading.hidden { opacity:0; pointer-events:none; }
  #loading .loader-ring {
    width:48px; height:48px; border:3px solid var(--surface2);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  #loading .loader-text { margin-top:16px; color:var(--text3); font-size:0.75rem; letter-spacing:0.05em; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:768px) {
    #header { padding:12px 16px; }
    #header h1 { font-size:1.2rem; }
    #bottom-bar { padding:10px 8px; gap:6px; }
    .key-hint { padding:6px 10px; gap:6px; }
    .key-hint .key-badge { width:22px; height:22px; font-size:0.6rem; }
    .key-hint .key-label { font-size:0.55rem; }
    #info-panel { padding:10px 14px; gap:16px; }
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui-overlay">
  <div id="header">
    <div>
      <h1>DRUM STUDIO</h1>
      <div class="subtitle">Interactive 3D Drum Kit</div>
    </div>
    <div id="info-panel">
      <div class="stat"><div class="stat-val" id="hit-count">0</div><div class="stat-lbl">Hits</div></div>
      <div class="stat"><div class="stat-val" id="last-drum">&mdash;</div><div class="stat-lbl">Last</div></div>
      <div id="hit-indicator">HIT!</div>
    </div>
  </div>
  <div id="bottom-bar">
    <div class="key-hint" data-drum="kick"><span class="key-badge">Space</span><span class="key-label">Kick</span></div>
    <div class="key-hint" data-drum="snare"><span class="key-badge">S</span><span class="key-label">Snare</span></div>
    <div class="key-hint" data-drum="hihat"><span class="key-badge">H</span><span class="key-label">Hi-Hat</span></div>
    <div class="key-hint" data-drum="hihat-open"><span class="key-badge">J</span><span class="key-label">Open HH</span></div>
    <div class="key-hint" data-drum="tom-high"><span class="key-badge">T</span><span class="key-label">Tom H</span></div>
    <div class="key-hint" data-drum="tom-mid"><span class="key-badge">Y</span><span class="key-label">Tom M</span></div>
    <div class="key-hint" data-drum="tom-floor"><span class="key-badge">U</span><span class="key-label">Floor</span></div>
    <div class="key-hint" data-drum="crash"><span class="key-badge">C</span><span class="key-label">Crash</span></div>
    <div class="key-hint" data-drum="ride"><span class="key-badge">R</span><span class="key-label">Ride</span></div>
  </div>
</div>
<div id="tooltip"></div>
<div id="loading"><div class="loader-ring"></div><div class="loader-text">Loading studio...</div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── SOUND ENGINE ────────────────────────────────────
class DrumSynth {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.compressor = null;
    this.reverb = null;
    this.ready = false;
  }

  async init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.75;
    this.compressor = this.ctx.createDynamicsCompressor();
    this.compressor.threshold.value = -24;
    this.compressor.knee.value = 30;
    this.compressor.ratio.value = 12;
    this.compressor.attack.value = 0.003;
    this.compressor.release.value = 0.25;
    this.reverb = this.ctx.createConvolver();
    this.reverb.buffer = this._createReverbBuffer(1.5, 0.5);
    const reverbGain = this.ctx.createGain();
    reverbGain.gain.value = 0.2;
    this.reverb.connect(reverbGain);
    this.compressor.connect(this.ctx.destination);
    const dryGain = this.ctx.createGain();
    dryGain.gain.value = 0.85;
    this.masterGain.connect(dryGain);
    this.masterGain.connect(this.reverb);
    dryGain.connect(this.compressor);
    reverbGain.connect(this.compressor);
    this.ready = true;
  }

  _createReverbBuffer(duration, decay) {
    const sampleRate = this.ctx.sampleRate;
    const length = sampleRate * duration;
    const buffer = this.ctx.createBuffer(2, length, sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay * 3);
      }
    }
    return buffer;
  }

  _gainEnvelope(g, tStart, aTime, dTime, sLevel, rTime) {
    const now = this.ctx.currentTime + tStart;
    g.cancelScheduledValues(now);
    g.setValueAtTime(0, now);
    g.linearRampToValueAtTime(1, now + aTime);
    g.linearRampToValueAtTime(sLevel, now + aTime + dTime);
    g.exponentialRampToValueAtTime(0.001, now + aTime + dTime + rTime);
  }

  _gainEnvelopeQuick(g, tStart, peak, peakTime, decay) {
    const now = this.ctx.currentTime + tStart;
    g.cancelScheduledValues(now);
    g.setValueAtTime(0, now);
    g.linearRampToValueAtTime(peak, now + peakTime);
    g.exponentialRampToValueAtTime(0.001, now + decay);
  }

  play(drumType) {
    if (!this.ready) return;
    const now = this.ctx.currentTime;
    switch (drumType) {
      case 'kick': this._kick(now); break;
      case 'snare': this._snare(now); break;
      case 'hihat': this._hihat(now, false); break;
      case 'hihat-open': this._hihat(now, true); break;
      case 'tom-high': this._tom(now, 180, 0.12); break;
      case 'tom-mid': this._tom(now, 130, 0.15); break;
      case 'tom-floor': this._tom(now, 85, 0.2); break;
      case 'crash': this._crash(now); break;
      case 'ride': this._ride(now); break;
    }
  }

  _kick(now) {
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.08);
    this._gainEnvelopeQuick(g, 0, 1.8, 0.005, 0.4);
    osc.connect(g);
    g.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.5);

    const click = this.ctx.createOscillator();
    const cg = this.ctx.createGain();
    click.type = 'triangle';
    click.frequency.setValueAtTime(3000, now);
    click.frequency.exponentialRampToValueAtTime(200, now + 0.01);
    this._gainEnvelopeQuick(cg, 0, 0.4, 0.001, 0.02);
    click.connect(cg);
    cg.connect(this.masterGain);
    click.start(now);
    click.stop(now + 0.03);
  }

  _snare(now) {
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(160, now + 0.05);
    this._gainEnvelopeQuick(g, 0, 0.8, 0.003, 0.18);
    osc.connect(g);
    g.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.25);

    const noiseLen = this.ctx.sampleRate * 0.2;
    const noiseBuf = this.ctx.createBuffer(1, noiseLen, this.ctx.sampleRate);
    const noiseData = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) noiseData[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const noiseG = this.ctx.createGain();
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1000;
    noiseFilter.Q.value = 0.7;
    this._gainEnvelopeQuick(noiseG, 0, 1.4, 0.002, 0.2);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseG);
    noiseG.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.25);
  }

  _hihat(now, open) {
    const noiseLen = this.ctx.sampleRate * (open ? 0.6 : 0.12);
    const noiseBuf = this.ctx.createBuffer(1, noiseLen, this.ctx.sampleRate);
    const noiseData = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) noiseData[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const noiseG = this.ctx.createGain();
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = open ? 5000 : 7000;
    noiseFilter.Q.value = 0.5;
    const decay = open ? 0.6 : 0.08;
    this._gainEnvelopeQuick(noiseG, 0, 0.9, 0.001, decay);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseG);
    noiseG.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + decay + 0.05);

    if (!open) {
      const metal = this.ctx.createOscillator();
      const mg = this.ctx.createGain();
      metal.type = 'square';
      metal.frequency.setValueAtTime(8000, now);
      this._gainEnvelopeQuick(mg, 0, 0.12, 0.001, 0.04);
      metal.connect(mg);
      mg.connect(this.masterGain);
      metal.start(now);
      metal.stop(now + 0.06);
    }
  }

  _tom(now, freq, decay) {
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 1.2, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + 0.04);
    this._gainEnvelopeQuick(g, 0, 1.2, 0.004, decay);
    osc.connect(g);
    g.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + decay + 0.1);

    const osc2 = this.ctx.createOscillator();
    const g2 = this.ctx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(freq * 2.5, now);
    osc2.frequency.exponentialRampToValueAtTime(freq * 1.1, now + 0.03);
    this._gainEnvelopeQuick(g2, 0, 0.5, 0.002, decay * 0.7);
    osc2.connect(g2);
    g2.connect(this.masterGain);
    osc2.start(now);
    osc2.stop(now + decay + 0.1);
  }

  _crash(now) {
    const noiseLen = this.ctx.sampleRate * 1.8;
    const noiseBuf = this.ctx.createBuffer(1, noiseLen, this.ctx.sampleRate);
    const noiseData = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) noiseData[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const noiseG = this.ctx.createGain();
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 3000;
    noiseFilter.Q.value = 0.3;
    this._gainEnvelopeQuick(noiseG, 0, 1.1, 0.004, 1.7);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseG);
    noiseG.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 2.0);

    for (let i = 0; i < 3; i++) {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600 + i * 300, now);
      this._gainEnvelopeQuick(g, 0, 0.18, 0.002 + i * 0.001, 1.0 + i * 0.3);
      osc.connect(g);
      g.connect(this.masterGain);
      osc.start(now);
      osc.stop(now + 1.5);
    }
  }

  _ride(now) {
    const noiseLen = this.ctx.sampleRate * 1.2;
    const noiseBuf = this.ctx.createBuffer(1, noiseLen, this.ctx.sampleRate);
    const noiseData = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) noiseData[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const noiseG = this.ctx.createGain();
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 5000;
    noiseFilter.Q.value = 2;
    this._gainEnvelopeQuick(noiseG, 0, 0.7, 0.003, 1.0);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseG);
    noiseG.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 1.5);

    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(750, now + 0.8);
    this._gainEnvelopeQuick(g, 0, 0.25, 0.002, 1.0);
    osc.connect(g);
    g.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 1.5);
  }
}

// ─── SCENE SETUP ─────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0a0f, 8, 30);
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 50);
camera.position.set(3.5, 3.2, 7.5);
camera.lookAt(0, 0.5, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.8, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.65;
controls.minPolarAngle = 0.2;
controls.update();

// ─── LIGHTING ────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x1a1a3a, 0.8);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffeedd, 6);
keyLight.position.set(5, 8, 3);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -8;
keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -8;
keyLight.shadow.bias = -0.0003;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0x6b6bff, 3);
rimLight.position.set(-3, 2, -4);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0xffccaa, 1.5);
fillLight.position.set(0, 1, 7);
scene.add(fillLight);

const topLight = new THREE.PointLight(0xff9966, 8, 6);
topLight.position.set(0, 4, 0);
scene.add(topLight);

const accentLight1 = new THREE.PointLight(0xff6b6b, 12, 4);
accentLight1.position.set(2, 1.5, -2);
scene.add(accentLight1);

const accentLight2 = new THREE.PointLight(0x6bcbff, 8, 4);
accentLight2.position.set(-2.5, 1.5, 2);
scene.add(accentLight2);

// ─── GROUND ──────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111118, roughness: 0.3, metalness: 0.5
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.2;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.PolarGridHelper(10, 64, 48, 128, 0x222233, 0x222233);
gridHelper.position.y = -2.19;
scene.add(gridHelper);

const stageGeo = new THREE.CylinderGeometry(3.5, 3.8, 0.15, 48);
const stageMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a28, roughness: 0.25, metalness: 0.6
});
const stage = new THREE.Mesh(stageGeo, stageMat);
stage.position.y = -2.12;
stage.receiveShadow = true;
stage.castShadow = true;
scene.add(stage);

const stageEdgeGeo = new THREE.TorusGeometry(3.65, 0.06, 16, 64);
const stageEdgeMat = new THREE.MeshStandardMaterial({
  color: 0x444466, roughness: 0.3, metalness: 0.8, emissive: 0x111122, emissiveIntensity: 0.5
});
const stageEdge = new THREE.Mesh(stageEdgeGeo, stageEdgeMat);
stageEdge.rotation.x = Math.PI / 2;
stageEdge.position.y = -2.04;
stageEdge.receiveShadow = true;
scene.add(stageEdge);

// ─── WALL BACKDROP ───────────────────────────────────
const wallGeo = new THREE.PlaneGeometry(16, 8);
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x141420, roughness: 0.5, metalness: 0.1
});
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 2, -5.5);
wall.receiveShadow = true;
scene.add(wall);

// wall panels
for (let i = 0; i < 8; i++) {
  const panelGeo = new THREE.BoxGeometry(1.8, 7.5, 0.05);
  const panelMat = new THREE.MeshStandardMaterial({
    color: 0x181828, roughness: 0.4, metalness: 0.3
  });
  const panel = new THREE.Mesh(panelGeo, panelMat);
  panel.position.set(-7.2 + i * 2.05, 2, -5.45);
  panel.receiveShadow = true;
  scene.add(panel);
}

// ─── MATERIALS LIBRARY ──────────────────────────────
const matShell = (color, rough = 0.3, metal = 0.6) =>
  new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });

const matHead = (color) =>
  new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.05 });

const matRim = () =>
  new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.95 });

const matStand = () =>
  new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.3, metalness: 0.85 });

const matCymbal = (color = 0xc8a830) =>
  new THREE.MeshStandardMaterial({ color, roughness: 0.25, metalness: 0.9, envMapIntensity: 0.4 });

const matDrumHardware = () =>
  new THREE.MeshStandardMaterial({ color: 0xa0a0b0, roughness: 0.25, metalness: 0.9 });

// ─── HELPERS ─────────────────────────────────────────
function createStandPole(height, radius = 0.04) {
  const geo = new THREE.CylinderGeometry(radius, radius, height, 24);
  const mesh = new THREE.Mesh(geo, matStand());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function createDrumShell(radius, height, color) {
  const geo = new THREE.CylinderGeometry(radius, radius, height, 48);
  const mesh = new THREE.Mesh(geo, matShell(color));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function createDrumHead(radius, y, color = 0xe8e8e0) {
  const geo = new THREE.CircleGeometry(radius, 48);
  const mesh = new THREE.Mesh(geo, matHead(color));
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = y;
  mesh.receiveShadow = true;
  mesh.name = 'drumHead';
  return mesh;
}

function createRim(radius, y, thickness = 0.03) {
  const geo = new THREE.TorusGeometry(radius, thickness, 16, 64);
  const mesh = new THREE.Mesh(geo, matRim());
  mesh.rotation.x = Math.PI / 2;
  mesh.position.y = y;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function createLug(cylinderRadius, y, shellHeight) {
  const geo = new THREE.BoxGeometry(0.04, 0.12, 0.04);
  const mesh = new THREE.Mesh(geo, matDrumHardware());
  mesh.position.y = y;
  const angle = Math.random() * Math.PI * 2;
  mesh.position.x = Math.cos(angle) * (cylinderRadius + 0.02);
  mesh.position.z = Math.sin(angle) * (cylinderRadius + 0.02);
  mesh.rotation.y = angle;
  mesh.castShadow = true;
  return mesh;
}

// ─── BUILD DRUMS ─────────────────────────────────────
const drumObjects = [];
const drumGroups = {};
const hitTargets = [];

function addDrumGroup(name, group) {
  drumGroups[name] = group;
  group.name = `drum-${name}`;
  group.userData.drumType = name;
  group.traverse((child) => {
    child.userData = child.userData || {};
    child.userData.drumType = name;
  });
  hitTargets.push(group);
  scene.add(group);
}

// ─── PARTICLES ────────────────────────────���──────────
const particlesPool = [];
const particleGeo = new THREE.SphereGeometry(0.025, 4, 4);
const maxParticles = 200;

for (let i = 0; i < maxParticles; i++) {
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.08, 0.9, 0.65),
    transparent: true, opacity: 0
  });
  const particle = new THREE.Mesh(particleGeo, mat);
  particle.visible = false;
  particle.userData = { velocity: new THREE.Vector3(), life: 0, maxLife: 0 };
  scene.add(particle);
  particlesPool.push(particle);
}

let particleIndex = 0;

function emitParticles(position, count = 30, color = null) {
  for (let i = 0; i < count; i++) {
    const p = particlesPool[particleIndex % maxParticles];
    particleIndex++;
    p.visible = true;
    p.position.copy(position);
    p.userData.velocity.set(
      (Math.random() - 0.5) * 2.5,
      Math.random() * 3 + 1,
      (Math.random() - 0.5) * 2.5
    );
    p.userData.life = 0;
    p.userData.maxLife = 0.3 + Math.random() * 0.5;
    p.material.opacity = 1;
    if (color) p.material.color.copy(color);
    else p.material.color.setHSL(Math.random() * 0.1 + 0.07, 0.9, 0.6 + Math.random() * 0.2);
  }
}

// ─── RAYCASTER ───────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getDrumIntersections(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hitTargets, true);
  if (intersects.length > 0) {
    for (const intersect of intersects) {
      let obj = intersect.object;
      while (obj) {
        if (obj.userData && obj.userData.drumType) {
          return { drum: obj.userData.drumType, point: intersect.point, object: obj };
        }
        obj = obj.parent;
      }
    }
  }
  return null;
}

// ─── KEYBOARD MAPPING ────────────────────────────────
const keyMap = {
  'Space': 'kick', 'KeyD': 'kick',
  'KeyS': 'snare', 'KeyF': 'snare',
  'KeyH': 'hihat', 'KeyJ': 'hihat-open',
  'KeyT': 'tom-high', 'KeyG': 'tom-high',
  'KeyY': 'tom-mid', 'KeyR': 'tom-mid',
  'KeyU': 'tom-floor',
  'KeyC': 'crash', 'KeyE': 'ride'
};

// ─── AUDIO INIT ──────────────────────────────────────
const synth = new DrumSynth();
let audioReady = false;

async function ensureAudio() {
  if (!audioReady) {
    await synth.init();
    audioReady = true;
  }
}

// ─── VISUAL HIT FEEDBACK ─────────────────────────────
function flashDrumVisual(drumName) {
  if (drumName === 'hihat' || drumName === 'hihat-open') {
    const hihatGroup = drumGroups['hihat'];
    if (hihatGroup) {
      const topGroup = hihatGroup.getObjectByName('hihatTop');
      if (topGroup) {
        topGroup.position.y = drumName === 'hihat' ? 0.72 : 0.82;
        setTimeout(() => { topGroup.position.y = 0.77; }, drumName === 'hihat' ? 60 : 200);
      }
    }
  }

  const group = drumGroups[drumName];
  if (group) {
    const originalScale = group.scale.clone();
    const tweenTarget = drumName === 'kick' ? 0.96 : 0.92;
    group.scale.set(tweenTarget, tweenTarget, tweenTarget);
    setTimeout(() => {
      group.scale.copy(originalScale);
    }, drumName === 'crash' ? 300 : 120);
  }
}

// ─── HIT HANDLER ─────────────────────────────────────
let hitCount = 0;

function hitDrum(drumName, worldPos = null) {
  ensureAudio().then(() => {
    synth.play(drumName);
  });

  flashDrumVisual(drumName);
  hitCount++;
  document.getElementById('hit-count').textContent = hitCount;
  document.getElementById('last-drum').textContent = drumName.replace('-', ' ').toUpperCase();

  const indicator = document.getElementById('hit-indicator');
  indicator.style.opacity = '1';
  setTimeout(() => { indicator.style.opacity = '0'; }, 100);

  const keyHint = document.querySelector(`.key-hint[data-drum="${drumName}"]`);
  if (keyHint) {
    keyHint.classList.add('flash');
    setTimeout(() => keyHint.classList.remove('flash'), 150);
  }

  if (worldPos) {
    const colors = {
      'kick': 0xff6b6b, 'snare': 0xeeeeff,
      'hihat': 0xffd93d, 'hihat-open': 0xffe066,
      'tom-high': 0xff8844, 'tom-mid': 0xff7744, 'tom-floor': 0xff6633,
      'crash': 0xFFF176, 'ride': 0xFFD54F
    };
    emitParticles(worldPos, drumName === 'crash' ? 50 : 25,
      new THREE.Color(colors[drumName] || 0xffaa44));
  }
}

// ─── EVENT LISTENERS ─────────────────────────────────
window.addEventListener('click', async (event) => {
  if (event.target.closest('.key-hint') || event.target.closest('#info-panel') ||
      event.target.closest('#header')) return;
  await ensureAudio();
  const result = getDrumIntersections(event);
  if (result) {
    hitDrum(result.drum, result.point);
  }
});

window.addEventListener('keydown', async (event) => {
  if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
  if (event.repeat) return;
  const drumName = keyMap[event.code];
  if (drumName) {
    event.preventDefault();
    await ensureAudio();
    const group = drumGroups[drumName];
    let worldPos = null;
    if (group) {
      const pos = new THREE.Vector3();
      group.getWorldPosition(pos);
      worldPos = pos;
    }
    hitDrum(drumName, worldPos);
  }
});

// Key hints click
document.querySelectorAll('.key-hint').forEach(hint => {
  hint.addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureAudio();
    const drumName = hint.dataset.drum;
    const group = drumGroups[drumName];
    let worldPos = null;
    if (group) {
      const pos = new THREE.Vector3();
      group.getWorldPosition(pos);
      worldPos = pos;
    }
    hitDrum(drumName, worldPos);
  });
});

// Tooltip on hover
window.addEventListener('mousemove', (event) => {
  const result = getDrumIntersections(event);
  const tooltip = document.getElementById('tooltip');
  if (result) {
    tooltip.textContent = result.drum.replace('-', ' ').toUpperCase();
    tooltip.style.left = event.clientX + 'px';
    tooltip.style.top = event.clientY + 'px';
    tooltip.style.opacity = '1';
    document.body.style.cursor = 'pointer';
  } else {
    tooltip.style.opacity = '0';
    document.body.style.cursor = '';
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── TOUCH SUPPORT ───────────────────────────────────
window.addEventListener('touchstart', async (event) => {
  if (event.target.closest('.key-hint') || event.target.closest('#info-panel') ||
      event.target.closest('#header')) return;
  if (event.touches.length === 1) {
    const touch = event.touches[0];
    await ensureAudio();
    const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
    const result = getDrumIntersections(fakeEvent);
    if (result) {
      hitDrum(result.drum, result.point);
    }
  }
}, { passive: false });

// ─── RENDER LOOP ─────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const time = performance.now() * 0.001;

  controls.update();

  // Update particles
  for (const p of particlesPool) {
    if (!p.visible) continue;
    p.userData.life += dt;
    if (p.userData.life >= p.userData.maxLife) {
      p.visible = false;
      continue;
    }
    const progress = p.userData.life / p.userData.maxLife;
    p.userData.velocity.y -= 4 * dt;
    p.position.x += p.userData.velocity.x * dt;
    p.position.y += p.userData.velocity.y * dt;
    p.position.z += p.userData.velocity.z * dt;
    p.material.opacity = 1 - progress;
    p.scale.setScalar(1 - progress * 0.6);
  }

  // Ambient particles
  for (const p of ambientParticles) {
    p.position.y = p.userData.baseY + Math.sin(time * p.userData.speed + p.position.x) * p.userData.amplitude;
    p.material.opacity = 0.15 + Math.sin(time * p.userData.speed * 1.3 + p.position.z) * 0.1 + 0.15;
  }

  // Gentle light animation
  accentLight1.intensity = 10 + Math.sin(time * 0.7) * 3;
  accentLight2.intensity = 7 + Math.cos(time * 0.9) * 2;
  topLight.intensity = 7 + Math.sin(time * 0.5) * 2;

  renderer.render(scene, camera);
}

animate();
