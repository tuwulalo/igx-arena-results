<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Depths — 3D Simulation</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --depth-shallow: #0077be;
  --depth-mid: #004a77;
  --depth-deep: #001a33;
  --depth-abyss: #000a14;
  --accent: #00d4ff;
  --accent-warm: #ff8844;
  --ui-bg: rgba(0, 10, 30, 0.7);
  --ui-border: rgba(0, 180, 255, 0.25);
  --text: #cceeff;
  --text-dim: rgba(180, 220, 255, 0.7);
}
body {
  overflow: hidden;
  background: #000510;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  cursor: grab;
}
body:active { cursor: grabbing; }
body.grabbing { cursor: grabbing; }
#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}
#canvas-container canvas { display: block; }

#ui-layer {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

.depth-panel {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 320px;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 26px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 4px;
}
.depth-track {
  flex: 1;
  width: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  position: relative;
  margin: 4px 0;
}
.depth-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, #001a44, #0066cc, #00bbff, #88ddff);
  border-radius: 2px;
  transition: height 0.3s ease;
}
.depth-marker {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent);
  box-shadow: 0 0 12px var(--accent), 0 0 4px var(--accent);
  transition: bottom 0.3s ease;
  z-index: 2;
}
.depth-zone {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  opacity: 0.5;
}
.depth-value {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.04em;
}
.depth-unit { font-size: 9px; font-weight: 400; opacity: 0.6; }

.controls-hint {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 20px;
  padding: 8px 20px;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  gap: 16px;
  align-items: center;
  transition: opacity 0.6s;
}
.controls-hint span { display: flex; align-items: center; gap: 6px; }
.controls-hint .key {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
}

.info-badge {
  position: absolute;
  top: 20px;
  left: 24px;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 14px;
  padding: 10px 18px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.info-badge .title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  opacity: 0.7;
}
.info-badge .depth-label {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 0.02em;
  color: #fff;
}
.info-badge .depth-label strong { font-weight: 700; color: var(--accent); }

.vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,2,10,0.35) 80%, rgba(0,2,15,0.7) 100%);
  transition: opacity 0.5s;
}

.surface-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

@media (max-width: 768px) {
  .depth-panel { right: 8px; width: 40px; height: 220px; border-radius: 20px; padding: 8px 0; }
  .depth-marker { width: 10px; height: 10px; }
  .depth-value { font-size: 11px; }
  .controls-hint { padding: 6px 14px; font-size: 10px; gap: 10px; }
  .info-badge { top: 10px; left: 10px; padding: 6px 12px; }
  .info-badge .depth-label { font-size: 17px; }
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui-layer">
  <div class="info-badge" id="info-badge">
    <span class="title">Depth</span>
    <span class="depth-label" id="depth-label"><strong>0</strong><span class="depth-unit"> m</span></span>
  </div>
  <div class="depth-panel" id="depth-panel">
    <span class="depth-zone">SURFACE</span>
    <div class="depth-track">
      <div class="depth-fill" id="depth-fill"></div>
      <div class="depth-marker" id="depth-marker"></div>
    </div>
    <span class="depth-zone" id="depth-zone-label">DEEP</span>
    <span class="depth-value" id="depth-value">0<span class="depth-unit">m</span></span>
  </div>
  <div class="controls-hint" id="controls-hint">
    <span><span class="key">↔</span> Drag to look</span>
    <span><span class="key">↕</span> Scroll to dive</span>
    <span><span class="key">W S</span> Move</span>
  </div>
</div>
<div class="vignette" id="vignette"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const WORLD = 180;
const SURFACE_Y = 0;
const FLOOR_Y = -90;
const MAX_DEPTH = FLOOR_Y;
const canvasContainer = document.getElementById('canvas-container');
const depthLabel = document.getElementById('depth-label');
const depthValue = document.getElementById('depth-value');
const depthFill = document.getElementById('depth-fill');
const depthMarker = document.getElementById('depth-marker');
const depthZoneLabel = document.getElementById('depth-zone-label');
const vignette = document.getElementById('vignette');
const controlsHint = document.getElementById('controls-hint');

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x004466, 0.00008);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 1.5, 350);
camera.position.set(25, 8, 35);
camera.lookAt(0, -20, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
canvasContainer.appendChild(renderer.domElement);

const sunLight = new THREE.DirectionalLight(0xffffcc, 4.5);
sunLight.position.set(60, 60, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top = 80;
sunLight.shadow.camera.bottom = -80;
sunLight.shadow.bias = -0.0001;
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0x1a4477, 1.8);
scene.add(ambientLight);

const underwaterLight = new THREE.PointLight(0x3399cc, 8, 60, 1.5);
underwaterLight.position.set(0, -10, 0);
scene.add(underwaterLight);

const deepLight = new THREE.PointLight(0x001133, 2, 40, 2);
deepLight.position.set(0, -50, 0);
scene.add(deepLight);

const skyGeo = new THREE.SphereGeometry(150, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uCameraY: { value: 8 },
    uSunPos: { value: new THREE.Vector3(0.5, 0.4, 0.3).normalize() }
  },
  vertexShader: `
    varying vec3 vDir;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vDir = normalize(wp.xyz - cameraPosition);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    varying vec3 vDir;
    uniform float uTime;
    uniform float uCameraY;
    uniform vec3 uSunPos;
    void main() {
      float h = normalize(vDir).y;
      float sunDot = max(dot(normalize(vDir), uSunPos), 0.0);
      float sunGlow = pow(sunDot, 80.0) * 1.5 + pow(sunDot, 8.0) * 0.3;
      vec3 skyTop = vec3(0.05, 0.15, 0.45);
      vec3 skyHorizon = vec3(0.45, 0.65, 0.9);
      vec3 skyLow = vec3(0.6, 0.75, 0.95);
      float t = smoothstep(-0.1, 0.4, h);
      float t2 = smoothstep(0.0, 0.05, h);
      vec3 sky = mix(skyHorizon, skyTop, t);
      sky = mix(skyLow, sky, t2);
      sky += sunGlow * vec3(1.0, 0.95, 0.7);
      float vis = uCameraY > 0.0 ? 1.0 : clamp(1.0 + uCameraY * 0.015, 0.0, 1.0);
      gl_FragColor = vec4(sky * vis + vec3(0.0, 0.02, 0.08) * (1.0 - vis), 1.0);
    }`
});
const skyDome = new THREE.Mesh(skyGeo, skyMat);
skyDome.renderOrder = -1;
scene.add(skyDome);

const oceanGeo = new THREE.PlaneGeometry(WORLD * 1.4, WORLD * 1.4, 200, 200);
oceanGeo.rotateX(-Math.PI / 2);
const oceanMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: true,
  uniforms: {
    uTime: { value: 0 },
    uCameraY: { value: 8 },
    uLightDir: { value: new THREE.Vector3(0.5, 1.0, 0.3).normalize() }
  },
  vertexShader: `
    uniform float uTime;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying vec3 vViewDirW;
    varying float vHeight;
    varying vec3 vPos;
    float waveHeight(vec2 p) {
      float h = 0.0;
      h += 0.55 * sin(p.x * 1.57 + uTime * 0.75 + p.y * 0.3);
      h += 0.40 * sin(p.x * 1.05 + p.y * 1.2 + uTime * 0.62);
      h += 0.30 * sin(p.x * 0.63 - p.y * 0.9 + uTime * 0.85);
      h += 0.22 * sin(p.x * 2.1 + p.y * 1.5 + uTime * 0.55);
      h += 0.18 * sin(p.x * 0.85 - p.y * 2.3 + uTime * 0.9);
      return h;
    }
    void main() {
      vec3 pos = position;
      float h = waveHeight(pos.xz);
      pos.y += h;
      vHeight = h;
      vWorldPos = pos;
      vPos = position;
      float eps = 0.15;
      float hx = waveHeight(pos.xz + vec2(eps, 0.0));
      float hz = waveHeight(pos.xz + vec2(0.0, eps));
      vec3 approxNormal = normalize(vec3((h - hx) / eps, 1.0, (h - hz) / eps));
      vNormal = normalize((modelMatrix * vec4(approxNormal, 0.0)).xyz);
      vec4 worldPos = modelMatrix * vec4(pos, 1.0);
      vViewDirW = normalize(cameraPosition - worldPos.xyz);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }`,
  fragmentShader: `
    uniform float uTime;
    uniform float uCameraY;
    uniform vec3 uLightDir;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying vec3 vViewDirW;
    varying float vHeight;
    varying vec3 vPos;
    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(vViewDirW);
      vec3 L = normalize(uLightDir);
      float fresnel = pow(1.0 - abs(dot(N, V)), 3.5);
      vec3 H = normalize(L + V);
      float spec = pow(max(dot(N, H), 0.0), 200.0) * 0.55;
      float h01 = clamp(vHeight * 0.45 + 0.5, 0.0, 1.0);
      vec3 shallowColor = vec3(0.08, 0.35, 0.6);
      vec3 deepColor = vec3(0.01, 0.08, 0.25);
      vec3 waterColor = mix(deepColor, shallowColor, h01);
      vec3 skyRefl = vec3(0.35, 0.55, 0.8);
      vec3 color = waterColor + fresnel * skyRefl * 0.6 + spec * vec3(1.0, 0.92, 0.75);
      float alpha = 0.92 + fresnel * 0.08;
      if (uCameraY < 0.0) {
        color = mix(color, vec3(0.18, 0.5, 0.78), 0.55);
        color += 0.12;
        alpha = 0.55 + clamp(-uCameraY * 0.006, 0.0, 0.3);
      }
      gl_FragColor = vec4(color, clamp(alpha, 0.0, 1.0));
    }`
});
const oceanSurface = new THREE.Mesh(oceanGeo, oceanMat);
oceanSurface.position.y = SURFACE_Y;
oceanSurface.renderOrder = 1;
oceanSurface.material.depthWrite = true;
scene.add(oceanSurface);

const floorGeo = new THREE.PlaneGeometry(WORLD * 1.3, WORLD * 1.3, 120, 120);
floorGeo.rotateX(-Math.PI / 2);
const floorPositions = floorGeo.attributes.position.array;
for (let i = 0; i < floorPositions.length; i += 3) {
  const x = floorPositions[i];
  const z = floorPositions[i + 2];
  const dist = Math.sqrt(x * x + z * z);
  let h = Math.sin(x * 0.04) * Math.cos(z * 0.05) * 5.0;
  h += Math.sin(x * 0.09 + z * 0.07) * 3.0;
  h += Math.cos(x * 0.12) * Math.sin(z * 0.11) * 2.0;
  h += Math.sin(dist * 0.06) * 2.5;
  if (dist > WORLD * 0.55) h -= (dist - WORLD * 0.55) * 0.5;
  floorPositions[i + 1] = FLOOR_Y + h;
}
floorGeo.computeVertexNormals();
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xc8b078,
  roughness: 0.85,
  metalness: 0.02,
  flatShading: false
});
const seaFloor = new THREE.Mesh(floorGeo, floorMat);
seaFloor.receiveShadow = true;
scene.add(seaFloor);

const floorDetailGeo = new THREE.PlaneGeometry(WORLD * 1.2, WORLD * 1.2, 200, 200);
floorDetailGeo.rotateX(-Math.PI / 2);
const detailPositions = floorDetailGeo.attributes.position.array;
for (let i = 0; i < detailPositions.length; i += 3) {
  const x = detailPositions[i];
  const z = detailPositions[i + 2];
  const dist = Math.sqrt(x * x + z * z);
  let h = Math.sin(x * 0.12) * Math.cos(z * 0.09) * 2.5;
  h += Math.sin(x * 0.18 + z * 0.15) * 1.5;
  h += Math.cos(dist * 0.08) * 1.8;
  if (dist > WORLD * 0.55) h -= (dist - WORLD * 0.55) * 0.5;
  detailPositions[i + 1] = FLOOR_Y + 0.3 + h;
}
floorDetailGeo.computeVertexNormals();
const floorDetailMat = new THREE.MeshStandardMaterial({
  color: 0xb89860,
  roughness: 0.9,
  metalness: 0.0,
  flatShading: true
});
const floorDetail = new THREE.Mesh(floorDetailGeo, floorDetailMat);
floorDetail.receiveShadow = true;
scene.add(floorDetail);

const rockGeo = new THREE.IcosahedronGeometry(1, 1);
const rockMat = new THREE.MeshStandardMaterial({ color: 0x5a5a60, roughness: 0.7, metalness: 0.15, flatShading: true });
for (let i = 0; i < 80; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 10 + Math.random() * 80;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  const baseY = FLOOR_Y + Math.sin(x * 0.04) * Math.cos(z * 0.05) * 5 + Math.sin(x * 0.09 + z * 0.07) * 3;
  const rock = new THREE.Mesh(rockGeo, rockMat);
  const s = 0.4 + Math.random() * 2.5;
  rock.scale.set(s * (0.6 + Math.random() * 0.8), s * (0.3 + Math.random() * 0.7), s * (0.6 + Math.random() * 0.8));
  rock.position.set(x, baseY + rock.scale.y * 0.3, z);
  rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  rock.castShadow = true;
  rock.receiveShadow = true;
  scene.add(rock);
}

const coralGroup = new THREE.Group();
scene.add(coralGroup);
const coralColors = [0xff5577, 0xff7744, 0xff5588, 0xee4466, 0xff6644, 0xff3366, 0xee8855, 0xff9988];
function createCoralCluster(cx, cy, cz) {
  const cluster = new THREE.Group();
  const branchCount = 2 + Math.floor(Math.random() * 6);
  const baseColor = coralColors[Math.floor(Math.random() * coralColors.length)];
  const mat = new THREE.MeshStandardMaterial({ color: baseColor, roughness: 0.35, metalness: 0.05, flatShading: true });
  const centerHeight = 1.2 + Math.random() * 2.5;
  const stalkGeo = new THREE.CylinderGeometry(0.15, 0.25, centerHeight, 7, 3);
  const stalk = new THREE.Mesh(stalkGeo, mat);
  stalk.position.y = centerHeight / 2;
  stalk.castShadow = true;
  cluster.add(stalk);
  for (let b = 0; b < branchCount; b++) {
    const angle = (b / branchCount) * Math.PI * 2 + Math.random() * 0.5;
    const radius = 0.3 + Math.random() * 1.0;
    const brHeight = centerHeight * (0.4 + Math.random() * 0.5);
    const brGeo = new THREE.CylinderGeometry(0.06, 0.13, brHeight, 5, 3);
    const branch = new THREE.Mesh(brGeo, mat);
    branch.position.set(Math.cos(angle) * radius, brHeight / 2, Math.sin(angle) * radius);
    branch.rotation.z = Math.cos(angle) * 0.6;
    branch.rotation.x = Math.sin(angle) * 0.6;
    branch.castShadow = true;
    cluster.add(branch);
    if (Math.random() < 0.5) {
      const subGeo = new THREE.CylinderGeometry(0.04, 0.08, brHeight * 0.55, 4, 2);
      const sub = new THREE.Mesh(subGeo, mat);
      sub.position.set(Math.cos(angle + 0.4) * radius * 1.3, brHeight * 0.7, Math.sin(angle + 0.4) * radius * 1.3);
      sub.rotation.z = Math.cos(angle + 0.4) * 0.8;
      sub.rotation.x = Math.sin(angle + 0.4) * 0.8;
      sub.castShadow = true;
      cluster.add(sub);
    }
  }
  const tipGeo = new THREE.SphereGeometry(0.12, 5, 4);
  const tip = new THREE.Mesh(tipGeo, mat);
  tip.position.y = centerHeight;
  cluster.add(tip);
  cluster.position.set(cx, cy, cz);
  cluster.rotation.y = Math.random() * Math.PI * 2;
  return cluster;
}
for (let i = 0; i < 50; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 8 + Math.random() * 70;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  const baseY = FLOOR_Y + Math.sin(x * 0.04) * Math.cos(z * 0.05) * 5 + Math.sin(x * 0.09 + z * 0.07) * 3;
  const coral = createCoralCluster(x, baseY + 0.3, z);
  coralGroup.add(coral);
}

const kelpGroup = new THREE.Group();
scene.add(kelpGroup);
const kelpMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.5, metalness: 0.02, flatShading: true, side: THREE.DoubleSide });
const kelpMaterial2 = new THREE.MeshStandardMaterial({ color: 0x3a7a28, roughness: 0.5, metalness: 0.02, flatShading: true, side: THREE.DoubleSide });
const kelpData = [];
for (let i = 0; i < 60; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 12 + Math.random() * 65;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  const baseY = FLOOR_Y + Math.sin(x * 0.04) * Math.cos(z * 0.05) * 5 + Math.sin(x * 0.09 + z * 0.07) * 3;
  const kelp = new THREE.Group();
  const segments = 4 + Math.floor(Math.random() * 5);
  const kelpH = 3 + Math.random() * 8;
  for (let s = 0; s < segments; s++) {
    const segGeo = new THREE.CylinderGeometry(0.08, 0.14, kelpH / segments, 6, 1);
    const seg = new THREE.Mesh(segGeo, Math.random() < 0.5 ? kelpMaterial : kelpMaterial2);
    seg.position.y = (s + 0.5) * (kelpH / segments);
    seg.castShadow = true;
    kelp.add(seg);
  }
  kelp.position.set(x, baseY + 0.1, z);
  kelp.rotation.z = (Math.random() - 0.5) * 0.4;
  kelp.rotation.x = (Math.random() - 0.5) * 0.4;
  kelpGroup.add(kelp);
  kelpData.push({ mesh: kelp, baseX: x, baseZ: z, height: kelpH, phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.6 });
}

function createFishShape(bodyLen, bodyW, bodyH, tailLen, tailW) {
  const shape = new THREE.Shape();
  const bl = bodyLen;
  const bw = bodyW;
  shape.moveTo(bl * 0.5, 0);
  shape.bezierCurveTo(bl * 0.35, bw * 0.9, bl * 0.05, bw * 0.8, -bl * 0.15, bw * 0.5);
  shape.lineTo(-bl * 0.35, bw * 0.4);
  shape.lineTo(-bl * 0.45 - tailLen, bw * 0.65 + tailW);
  shape.lineTo(-bl * 0.5, 0);
  shape.lineTo(-bl * 0.45 - tailLen, -bw * 0.65 - tailW);
  shape.lineTo(-bl * 0.35, -bw * 0.4);
  shape.bezierCurveTo(-bl * 0.15, -bw * 0.8, bl * 0.35, -bw * 0.9, bl * 0.5, 0);
  const extrudeSettings = { steps: 1, depth: bodyH, bevelEnabled: true, bevelThickness: bodyH * 0.25, bevelSize: bodyH * 0.25, bevelSegments: 3 };
  const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  geo.translate(0, 0, -bodyH / 2);
  return geo;

const cameraTarget = new THREE.Vector3(0, -20, 0);
let cameraTheta = 0.4;
let cameraPhi = 0.9;
let cameraDistance = 45;
let targetDepth = -20;
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false };

function updateCameraPosition() {
  const targetX = cameraTarget.x + cameraDistance * Math.sin(cameraPhi) * Math.cos(cameraTheta);
  const targetY = cameraTarget.y + cameraDistance * Math.cos(cameraPhi);
  const targetZ = cameraTarget.z + cameraDistance * Math.sin(cameraPhi) * Math.sin(cameraTheta);
  camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.08);
  camera.lookAt(cameraTarget);
}

function updateUI() {
  const depthMeters = Math.abs(Math.min(cameraTarget.y, SURFACE_Y));
  const d = Math.round(depthMeters);
  depthLabel.innerHTML = `<strong>${d}</strong><span class="depth-unit"> m</span>`;
  depthValue.innerHTML = `${d}<span class="depth-unit">m</span>`;
  const maxM = Math.abs(FLOOR_Y);
  const pct = Math.min(depthMeters / maxM, 1);
  depthFill.style.height = `${pct * 100}%`;
  depthMarker.style.bottom = `${pct * 100}%`;
  if (cameraTarget.y > -2) depthZoneLabel.textContent = 'SURFACE';
  else if (cameraTarget.y > -30) depthZoneLabel.textContent = 'SUNLIGHT';
  else if (cameraTarget.y > -60) depthZoneLabel.textContent = 'TWILIGHT';
  else depthZoneLabel.textContent = 'ABYSS';
  vignette.style.opacity = Math.min(depthMeters / 90, 0.7);
  controlsHint.style.opacity = d < 5 ? '1' : '0.3';
}

const clock = new THREE.Clock();
let totalTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  totalTime += dt;

  const lerpSpeed = 4;
  cameraTarget.y += (targetDepth - cameraTarget.y) * Math.min(dt * lerpSpeed, 1);

  const moveSpeed = 16;
  const moveDir = new THREE.Vector3();
  if (keys.w || keys.ArrowUp) moveDir.z -= 1;
  if (keys.s || keys.ArrowDown) moveDir.z += 1;
  if (keys.a) moveDir.x -= 1;
  if (keys.d) moveDir.x += 1;
  if (moveDir.length() > 0) {
    moveDir.normalize();
    const forward = new THREE.Vector3(
      Math.sin(cameraTheta),
      0,
      Math.cos(cameraTheta)
    ).normalize();
    const right = new THREE.Vector3(
      Math.cos(cameraTheta),
      0,
      -Math.sin(cameraTheta)
    ).normalize();
    const worldMove = forward.multiplyScalar(-moveDir.z).add(right.multiplyScalar(moveDir.x));
    cameraTarget.x += worldMove.x * moveSpeed * dt;
    cameraTarget.z += worldMove.z * moveSpeed * dt;
    cameraTarget.x = THREE.MathUtils.clamp(cameraTarget.x, -WORLD * 0.45, WORLD * 0.45);
    cameraTarget.z = THREE.MathUtils.clamp(cameraTarget.z, -WORLD * 0.45, WORLD * 0.45);
  }
  targetDepth = THREE.MathUtils.clamp(targetDepth, FLOOR_Y + 3, 10);
  cameraTarget.y = THREE.MathUtils.clamp(cameraTarget.y, FLOOR_Y + 3, 10);

  updateCameraPosition();

  const camY = camera.position.y;
  skyMat.uniforms.uTime.value = totalTime;
  skyMat.uniforms.uCameraY.value = camY;

  oceanMat.uniforms.uTime.value = totalTime;
  oceanMat.uniforms.uCameraY.value = camY;

  const depthRatio = Math.abs(Math.min(camY, 0)) / Math.abs(FLOOR_Y);
  const fogColor = new THREE.Color().lerpColors(
    new THREE.Color(0x005588),
    new THREE.Color(0x001122),
    depthRatio
  );
  scene.fog = new THREE.FogExp2(fogColor, 0.00003 + depthRatio * 0.00035);
  scene.background = fogColor;

  ambientLight.intensity = 1.8 * (1 - depthRatio * 0.85);
  ambientLight.color.set(0x1a4477).lerp(new THREE.Color(0x001133), depthRatio);
  sunLight.intensity = 4.5 * (1 - depthRatio);
  underwaterLight.intensity = 8 * (1 - depthRatio * 0.3);
  deepLight.intensity = 2 * (1 + depthRatio * 0.5);

  renderer.toneMappingExposure = 1.0 - depthRatio * 0.4;

  const waveOffset = totalTime * 0.3;
  const surfaceVisibility = camY > 0 ? 1 : Math.max(0, 0.55 - depthRatio * 0.6);
  oceanSurface.material.opacity = Math.max(0.15, surfaceVisibility);
  oceanSurface.visible = camY > FLOOR_Y + 2;
  skyDome.visible = camY > FLOOR_Y + 10;

  allFish.forEach(f => {
    const pos = f.mesh.position;
    pos.x += f.velocity.x * dt;
    pos.y += f.velocity.y * dt;
    pos.z += f.velocity.z * dt;
    if (Math.abs(pos.x) > WORLD * 0.42 || Math.abs(pos.z) > WORLD * 0.42) {
      f.velocity.x *= -1;
      f.velocity.z *= -1;
    }
    if (pos.y < f.species.depthMax - 2) f.velocity.y += 0.5 * dt;
    if (pos.y > f.species.depthMin + 2) f.velocity.y -= 0.5 * dt;
    pos.x = THREE.MathUtils.clamp(pos.x, -WORLD * 0.44, WORLD * 0.44);
    pos.z = THREE.MathUtils.clamp(pos.z, -WORLD * 0.44, WORLD * 0.44);
    pos.y = THREE.MathUtils.clamp(pos.y, f.species.depthMax - 1, f.species.depthMin + 1);
    f.velocity.y += (Math.random() - 0.5) * 0.6 * dt;
    f.velocity.x += (Math.random() - 0.5) * 0.4 * dt;
    f.velocity.z += (Math.random() - 0.5) * 0.4 * dt;
    const maxSpeed = f.species.speed;
    if (f.velocity.length() > maxSpeed) f.velocity.normalize().multiplyScalar(maxSpeed);
    if (f.velocity.length() > 0.05) {
      f.targetRotation = Math.atan2(f.velocity.x, f.velocity.z);
    }
    f.mesh.rotation.y += (f.targetRotation - f.mesh.rotation.y) * Math.min(dt * 4, 1);
    const wobble = Math.sin(totalTime * 3 + pos.x * 2) * 0.08;
    f.mesh.rotation.z = wobble;
  });

  for (let sIdx = 0; sIdx < fishSpecies.length; sIdx++) {
    const spec = fishSpecies[sIdx];
    const speciesFish = allFish.filter(f => f.species === spec);
    for (let i = 0; i < speciesFish.length; i++) {
      const fi = speciesFish[i];
      const pos = fi.mesh.position;
      let sepX = 0, sepY = 0, sepZ = 0;
      let aliX = 0, aliY = 0, aliZ = 0;
      let cohX = 0, cohY = 0, cohZ = 0;
      let sepCount = 0, aliCount = 0, cohCount = 0;
      const checkRadius = 6;
      const checkRadiusSq = checkRadius * checkRadius;
      for (let j = 0; j < speciesFish.length; j++) {
        if (i === j) continue;
        const other = speciesFish[j];
        const dx = other.mesh.position.x - pos.x;
        const dy = other.mesh.position.y - pos.y;
        const dz = other.mesh.position.z - pos.z;
        const distSq = dx * dx + dy * dy + dz * dz;
        if (distSq < checkRadiusSq && distSq > 0.001) {
          const dist = Math.sqrt(distSq);
          if (dist < 2.0) {
            sepX -= dx / dist;
            sepY -= dy / dist;
            sepZ -= dz / dist;
            sepCount++;
          }
          aliX += other.velocity.x;
          aliY += other.velocity.y;
          aliZ += other.velocity.z;
          aliCount++;
          cohX += other.mesh.position.x;
          cohY += other.mesh.position.y;
          cohZ += other.mesh.position.z;
          cohCount++;
        }
      }
      if (sepCount > 0) { fi.velocity.x += sepX / sepCount * 1.5 * dt; fi.velocity.y += sepY / sepCount * 1.5 * dt; fi.velocity.z += sepZ / sepCount * 1.5 * dt; }
      if (aliCount > 0) { fi.velocity.x += (aliX / aliCount - fi.velocity.x) * 0.8 * dt; fi.velocity.y += (aliY / aliCount - fi.velocity.y) * 0.8 * dt; fi.velocity.z += (aliZ / aliCount - fi.velocity.z) * 0.8 * dt; }
      if (cohCount > 0) { fi.velocity.x += (cohX / cohCount - pos.x) * 0.3 * dt; fi.velocity.y += (cohY / cohCount - pos.y) * 0.3 * dt; fi.velocity.z += (cohZ / cohCount - pos.z) * 0.3 * dt; }
    }
  }

  jellies.forEach(j => {
    j.mesh.position.y += Math.sin(totalTime * j.pulseSpeed + j.phase) * 0.3 * dt;
    j.mesh.position.x += j.driftX * dt;
    j.mesh.position.z += j.driftZ * dt;
    j.mesh.rotation.y += j.rotSpeed * dt;
    if (j.mesh.position.y < FLOOR_Y + 2) j.mesh.position.y = -3;
    if (j.mesh.position.y > SURFACE_Y - 1) j.mesh.position.y = SURFACE_Y - 1;
    if (Math.abs(j.mesh.position.x) > WORLD * 0.45) j.driftX *= -1;
    if (Math.abs(j.mesh.position.z) > WORLD * 0.45) j.driftZ *= -1;
    const pulse = 1 + Math.sin(totalTime * j.pulseSpeed * 2 + j.phase) * 0.08;
    j.mesh.children[0].scale.setScalar(pulse);
  });

  largeCreatures.forEach(lc => {
    lc.mesh.position.x += lc.velocity.x * dt;
    lc.mesh.position.z += lc.velocity.z * dt;
    lc.mesh.position.y += Math.sin(totalTime * 0.5 + lc.phase) * 0.4 * dt;
    if (Math.abs(lc.mesh.position.x) > WORLD * 0.42 || Math.abs(lc.mesh.position.z) > WORLD * 0.42) {
      lc.velocity.x *= -1;
      lc.velocity.z *= -1;
    }
    if (lc.mesh.position.y < lc.depthMax) lc.mesh.position.y = lc.depthMax;
    if (lc.mesh.position.y > lc.depthMin) lc.mesh.position.y = lc.depthMin;
    if (lc.velocity.length() > 0.05) {
      const targetRot = Math.atan2(lc.velocity.x, lc.velocity.z);
      lc.mesh.rotation.y += (targetRot - lc.mesh.rotation.y) * dt * 1.5;
    }
    lc.velocity.x += (Math.random() - 0.5) * 0.15 * dt;
    lc.velocity.z += (Math.random() - 0.5) * 0.15 * dt;
    if (lc.velocity.length() > lc.speed) lc.velocity.normalize().multiplyScalar(lc.speed);
    if (lc.velocity.length() < lc.speed * 0.3) lc.velocity.normalize().multiplyScalar(lc.speed * 0.3);
  });

  bubbles.forEach(b => {
    b.mesh.position.y += b.speed * dt;
    b.mesh.position.x += Math.sin(totalTime * b.wobbleSpeed + b.wobblePhase) * b.wobbleAmp * dt;
    b.mesh.position.z += Math.cos(totalTime * b.wobbleSpeed + b.wobblePhase + 1) * b.wobbleAmp * dt;
    if (b.mesh.position.y >= b.maxY - 0.5) {
      b.mesh.position.y = FLOOR_Y + Math.random() * 5;
      const angle = Math.random() * Math.PI * 2;
      const dist = 2 + Math.random() * 75;
      b.mesh.position.x = Math.cos(angle) * dist;
      b.mesh.position.z = Math.sin(angle) * dist;
    }
  });

  const pPos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pPos[i * 3 + 1] -= (0.1 + Math.random() * 0.2) * dt;
    pPos[i * 3] += (Math.random() - 0.5) * 0.3 * dt;
    pPos[i * 3 + 2] += (Math.random() - 0.5) * 0.3 * dt;
    if (pPos[i * 3 + 1] < FLOOR_Y) pPos[i * 3 + 1] = SURFACE_Y;
    if (pPos[i * 3 + 1] > SURFACE_Y) pPos[i * 3 + 1] = FLOOR_Y;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  kelpData.forEach(k => {
    k.mesh.rotation.z = Math.sin(totalTime * k.speed + k.phase) * 0.15;
    k.mesh.rotation.x = Math.cos(totalTime * k.speed * 0.7 + k.phase) * 0.1;
    const bend = Math.sin(totalTime * k.speed * 0.5 + k.phase) * 0.08;
    for (let c = 1; c < k.mesh.children.length; c++) {
      k.mesh.children[c].rotation.z = bend * (c / k.mesh.children.length);
      k.mesh.children[c].rotation.x = Math.cos(totalTime * k.speed * 0.6 + k.phase + c) * 0.06;
    }
  });

  godRayGroup.children.forEach((ray, idx) => {
    ray.rotation.y += dt * 0.05;
    ray.material.opacity = 0.02 + Math.sin(totalTime * 0.3 + idx) * 0.015;
  });

  updateUI();
  renderer.render(scene, camera);
}

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
  document.body.classList.add('grabbing');
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  cameraTheta -= dx * 0.005;
  cameraPhi -= dy * 0.005;
  cameraPhi = THREE.MathUtils.clamp(cameraPhi, 0.15, Math.PI - 0.15);
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  targetDepth += e.deltaY * 0.15;
  targetDepth = THREE.MathUtils.clamp(targetDepth, FLOOR_Y + 3, 10);
}, { passive: false });

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    document.body.classList.add('grabbing');
  }
}, { passive: false });
window.addEventListener('touchend', () => {
  isDragging = false;
  document.body.classList.remove('grabbing');
});
window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  cameraTheta -= dx * 0.005;
  cameraPhi -= dy * 0.005;
  cameraPhi = THREE.MathUtils.clamp(cameraPhi, 0.15, Math.PI - 0.15);
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.key in keys) keys[e.key] = true;
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
});
window.addEventListener('keyup', (e) => {
  if (e.key in keys) keys[e.key] = false;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
