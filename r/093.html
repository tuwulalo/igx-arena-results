<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Проекция Солнечной системы</title>
<style>
  :root {
    --bg: #05070a;
    --panel: rgba(12,18,30,0.85);
    --accent: #4fc3f7;
    --text: #e8eef6;
    --muted: #94a3b8;
    --sun: #ffab00;
    --gold: #ffd54f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  #canvas-container {
    position: fixed; inset: 0;
    z-index: 0;
  }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .hud-top {
    pointer-events: auto;
    padding: 22px 26px;
    display: flex; justify-content: space-between; align-items: flex-start;
    background: linear-gradient(180deg, rgba(5,7,10,0.85) 0%, rgba(5,7,10,0) 100%);
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .brand-icon {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold), var(--sun) 60%, #bf360c 100%);
    box-shadow: 0 0 24px rgba(255,171,0,0.35), inset 0 0 12px rgba(255,255,255,0.25);
  }
  .brand h1 {
    margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.3px;
  }
  .brand p {
    margin: 4px 0 0; font-size: 13px; color: var(--muted);
  }
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  button, select {
    pointer-events: auto;
    background: var(--panel);
    border: 1px solid rgba(79,195,247,0.25);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.2s ease;
  }
  button:hover, select:hover {
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(79,195,247,0.2);
  }
  button.active {
    background: rgba(79,195,247,0.18);
    border-color: var(--accent);
  }
  .hud-bottom {
    pointer-events: auto;
    padding: 22px 26px;
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 18px;
  }
  .info-card {
    width: 340px;
    background: var(--panel);
    border: 1px solid rgba(79,195,247,0.18);
    border-radius: 18px;
    padding: 18px 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.35);
  }
  .info-card h2 {
    margin: 0 0 10px; font-size: 18px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .info-card h2 .dot {
    width: 12px; height: 12px; border-radius: 50%;
    box-shadow: 0 0 10px currentColor;
  }
  .info-card p {
    margin: 0 0 10px; font-size: 14px; line-height: 1.5; color: var(--muted);
  }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    font-size: 12px;
  }
  .stat {
    background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 10px;
  }
  .stat b { display: block; color: var(--accent); font-size: 13px; margin-bottom: 2px; }
  .legend {
    display: flex; gap: 8px; flex-wrap: wrap; max-width: 520px;
  }
  .chip {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px; padding: 7px 12px;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.18s ease;
  }
  .chip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .chip span { width: 10px; height: 10px; border-radius: 50%; }
  .loader {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid rgba(79,195,247,0.15);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .speed-label { color: var(--muted); font-size: 12px; margin-right: 4px; }
  input[type=range] {
    accent-color: var(--accent); vertical-align: middle;
  }
  @media (max-width: 900px) {
    .hud-top { flex-direction: column; gap: 14px; }
    .info-card { width: 100%; }
    .hud-bottom { flex-direction: column; align-items: stretch; }
    .legend { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-ring"></div></div>
<div id="canvas-container"></div>
<div id="ui">
  <div class="hud-top">
    <div class="brand">
      <div class="brand-icon"></div>
      <div>
        <h1>Солнечная система</h1>
        <p>Интерактивная 3D проекция на Three.js</p>
      </div>
    </div>
    <div class="controls">
      <button id="btn-pause">Пауза</button>
      <button id="btn-orbits" class="active">Орбиты</button>
      <button id="btn-labels">Подписи</button>
      <span class="speed-label">Скорость:</span>
      <input id="speed" type="range" min="0" max="3" step="0.1" value="1">
      <select id="focus">
        <option value="">Свободный обзор</option>
        <option value="Sun">Солнце</option>
        <option value="Mercury">Меркурий</option>
        <option value="Venus">Венера</option>
        <option value="Earth">Земля</option>
        <option value="Mars">Марс</option>
        <option value="Jupiter">Юпитер</option>
        <option value="Saturn">Сатурн</option>
        <option value="Uranus">Уран</option>
        <option value="Neptune">Нептун</option>
      </select>
    </div>
  </div>
  <div class="hud-bottom">
    <div class="info-card" id="info-card">
      <h2 id="info-title"><span class="dot" style="background:#ffab00;color:#ffab00"></span>Солнце</h2>
      <p id="info-desc">Звезда, вокруг которой вращаются все планеты Солнечной системы. Содержит 99,86% общей массы системы.</p>
      <div class="stats">
        <div class="stat"><b>Диаметр</b><span id="info-diam">1 392 700 км</span></div>
        <div class="stat"><b>Температура</b><span id="info-temp">5 500 °C</span></div>
        <div class="stat"><b>Масса</b><span id="info-mass">1,989 × 10³⁰ кг</span></div>
        <div class="stat"><b>Тип</b><span id="info-type">Жёлтый карлик</span></div>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05070a, 0.0015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20000);
camera.position.set(0, 120, 340);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 25;
controls.maxDistance = 1200;
controls.maxPolarAngle = Math.PI;

const ambientLight = new THREE.AmbientLight(0x404060, 0.35);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xfff5e1, 2.2, 2000, 0.6);
sunLight.position.set(0, 0, 0);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.bias = -0.0001;
scene.add(sunLight);

function createStarfield() {
  const geometry = new THREE.BufferGeometry();
  const count = 12000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  const color = new THREE.Color();
  for (let i = 0; i < count; i++) {
    const r = 1200 + Math.random() * 2500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    const tint = Math.random();
    if (tint < 0.7) color.setHSL(0.6, 0.25, 0.7 + Math.random()*0.25);
    else if (tint < 0.9) color.setHSL(0.08, 0.4, 0.7);
    else color.setHSL(0.0, 0.5, 0.75);
    colors[i*3] = color.r; colors[i*3+1] = color.g; colors[i*3+2] = color.b;
    sizes[i] = 0.4 + Math.random() * 1.2;
  }
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const material = new THREE.PointsMaterial({
    size: 1.2, vertexColors: true, transparent: true, opacity: 0.9, sizeAttenuation: true
  });
  const stars = new THREE.Points(geometry, material);
  scene.add(stars);
  return stars;
}
const stars = createStarfield();

function makeStripeTexture(baseColor, bands, noiseAmount = 0.08) {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, c.width, c.height);
  for (let i = 0; i < bands; i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*0.06})`;
    const y = Math.random() * c.height;
    const h = 10 + Math.random() * 60;
    ctx.fillRect(0, y, c.width, h);
  }
  const imageData = ctx.getImageData(0,0,c.width,c.height);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * noiseAmount * 255;
    d[i] = Math.max(0, Math.min(255, d[i]+n));
    d[i+1] = Math.max(0, Math.min(255, d[i+1]+n));
    d[i+2] = Math.max(0, Math.min(255, d[i+2]+n));
  }
  ctx.putImageData(imageData, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeEarthTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a5a9e';
  ctx.fillRect(0,0,c.width,c.height);
  for (let i=0;i<80;i++) {
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath();
    const x = Math.random()*c.width, y = Math.random()*c.height;
    const r = 30 + Math.random()*90;
    ctx.ellipse(x,y,r,r*0.6,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  for (let i=0;i<120;i++) {
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    const x = Math.random()*c.width, y = Math.random()*c.height;
    const r = 20 + Math.random()*60;
    ctx.ellipse(x,y,r,r*0.5,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeMoonTexture() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#9e9e9e';
  ctx.fillRect(0,0,c.width,c.height);
  for (let i=0;i<60;i++) {
    ctx.fillStyle = `rgba(80,80,80,${0.15+Math.random()*0.25})`;
    ctx.beginPath();
    ctx.arc(Math.random()*c.width, Math.random()*c.height, 3+Math.random()*8, 0, Math.PI*2);
    ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

const planetData = [
  { name: 'Sun', radius: 14, distance: 0, period: 0, color: '#ffab00', emissive: '#ff8f00',
    desc: 'Звезда, вокруг которой вращаются все планеты Солнечной системы. Содержит 99,86% общей массы системы.',
    diam: '1 392 700 км', temp: '5 500 °C', mass: '1,989 × 10³⁰ кг', type: 'Жёлтый карлик' },
  { name: 'Mercury', radius: 2.2, distance: 32, period: 88, speed: 4.15, color: '#a5a5a5', bands: 6,
    desc: 'Ближайшая к Солнцу планета. Маленькая, покрытая кратерами, без атмосферы.',
    diam: '4 879 км', temp: '167 °C', mass: '3,285 × 10²³ кг', type: 'Планета земной группы' },
  { name: 'Venus', radius: 3.8, distance: 52, period: 225, speed: 1.62, color: '#e6c288', bands: 10,
    desc: 'Вторая планета от Солнца, самая горячая из-за парникового эффекта. Покрыта густой облачностью.',
    diam: '12 104 км', temp: '464 °C', mass: '4,867 × 10²⁴ кг', type: 'Планета земной группы' },
  { name: 'Earth', radius: 4, distance: 76, period: 365, speed: 1, color: '#2196f3', customTex: true, hasMoon: true,
    desc: 'Наша родная планета. Единственная известная планета с жизнью, жидкой водой и кислородной атмосферой.',
    diam: '12 742 км', temp: '15 °C', mass: '5,972 × 10²⁴ кг', type: 'Планета земной группы' },
  { name: 'Mars', radius: 3, distance: 102, period: 687, speed: 0.53, color: '#d84315', bands: 8,
    desc: 'Красная планета с пыльными бурями, полярными шапками и гигантскими каньонами.',
    diam: '6 779 км', temp: '-65 °C', mass: '6,39 × 10²³ кг', type: 'Планета земной группы' },
  { name: 'Jupiter', radius: 9.5, distance: 150, period: 4333, speed: 0.084, color: '#d4a373', bands: 22,
    desc: 'Крупнейшая планета Солнечной системы. Газовый гигант с Большим красным пятном и множеством спутников.',
    diam: '139 820 км', temp: '-110 °C', mass: '1,898 × 10²⁷ кг', type: 'Газовый гигант' },
  { name: 'Saturn', radius: 8, distance: 205, period: 10759, speed: 0.034, color: '#e0c178', bands: 18, hasRings: true,
    desc: 'Вторая по величине планета, знаменитая своей сложной системой колец из льда и пыли.',
    diam: '116 460 км', temp: '-140 °C', mass: '5,683 × 10²⁶ кг', type: 'Газовый гигант' },
  { name: 'Uranus', radius: 5.5, distance: 260, period: 30687, speed: 0.012, color: '#4dd0e1', bands: 12,
    desc: 'Ледяной гигант с уникальным наклоном оси вращения почти на 98°. Имеет тусклую кольцевую систему.',
    diam: '50 724 км', temp: '-195 °C', mass: '8,681 × 10²⁵ кг', type: 'Ледяной гигант' },
  { name: 'Neptune', radius: 5.3, distance: 310, period: 60190, speed: 0.006, color: '#3f51b5', bands: 14,
    desc: 'Самая дальняя планета от Солнца. Ледяной гигант с сильнейшими ветрами в Солнечной системе.',
    diam: '49 244 км', temp: '-200 °C', mass: '1,024 × 10²⁶ кг', type: 'Ледяной гигант' }
];

const planets = [];
const orbits = [];
const labels = [];
const planetMap = {};
let time = 0;
let speed = 1;
let paused = false;
let showOrbits = true;
let showLabels = false;
let focusTarget = null;

function createOrbit(radius) {
  const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
  const points = curve.getPoints(128);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 });
  const line = new THREE.LineLoop(geometry, material);
  line.rotation.x = Math.PI / 2;
  scene.add(line);
  return line;
}

function createLabel(text, color) {
  const div = document.createElement('div');
  div.className = 'planet-label';
  div.textContent = text;
  div.style.cssText = `position:absolute;color:${color};font-size:11px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.9);pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .25s;`;
  document.body.appendChild(div);
  return div;
}

planetData.forEach((d, idx) => {
  const group = new THREE.Group();
  let material;
  if (d.name === 'Sun') {
    material = new THREE.MeshBasicMaterial({ color: d.color });
  } else if (d.customTex) {
    material = new THREE.MeshStandardMaterial({ map: makeEarthTexture(), roughness: 0.7, metalness: 0.05 });
  } else {
    const tex = makeStripeTexture(d.color, d.bands || 8);
    material = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.75, metalness: 0.05 });
  }
  const geometry = new THREE.SphereGeometry(d.radius, 64, 64);
  const mesh = new THREE.Mesh(geometry, material);
  if (d.name !== 'Sun') {
    mesh.castShadow = true;
    mesh.receiveShadow = true;
  }
  group.add(mesh);

  if (d.name === 'Sun') {
    const glowGeo = new THREE.SphereGeometry(d.radius * 1.35, 64, 64);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.15, side: THREE.BackSide });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    group.add(glow);

    const coronaGeo = new THREE.SphereGeometry(d.radius * 1.6, 64, 64);
    const coronaMat = new THREE.MeshBasicMaterial({ color: 0xffd54f, transparent: true, opacity: 0.06, side: THREE.BackSide });
    const corona = new THREE.Mesh(coronaGeo, coronaMat);
    group.add(corona);
  }

  if (d.hasRings) {
    const ringGeo = new THREE.RingGeometry(d.radius * 1.4, d.radius * 2.4, 128);
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    for (let i=0;i<pos.count;i++) {
      const x = pos.getX(i), y = pos.getY(i);
      const l = Math.sqrt(x*x+y*y);
      const alpha = (l - d.radius*1.4) / (d.radius);
      uv.setXY(i, alpha, alpha);
    }
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0xc9b88a, transparent: true, opacity: 0.75,
      side: THREE.DoubleSide, roughness: 0.9
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2.1;
    ring.receiveShadow = true;
    group.add(ring);
  }

  if (d.hasMoon) {
    const moonGeo = new THREE.SphereGeometry(1.1, 32, 32);
    const moonMat = new THREE.MeshStandardMaterial({ map: makeMoonTexture(), roughness: 0.9 });
    const moon = new THREE.Mesh(moonGeo, moonMat);
    moon.castShadow = true; moon.receiveShadow = true;
    const moonPivot = new THREE.Group();
    moon.position.x = 9;
    moonPivot.add(moon);
    group.add(moonPivot);
    d.moonPivot = moonPivot;
  }

  scene.add(group);
  const orbit = createOrbit(d.distance);
  orbits.push(orbit);

  const label = createLabel(d.name, d.color);
  labels.push({ el: label, group, name: d.name });

  const obj = { data: d, group, mesh, angle: Math.random() * Math.PI * 2 };
  planets.push(obj);
  planetMap[d.name] = obj;
});

function buildLegend() {
  const legend = document.getElementById('legend');
  planetData.forEach(d => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span style="background:${d.color}"></span>${d.name}`;
    chip.addEventListener('click', () => {
      focusTarget = d.name;
      document.getElementById('focus').value = d.name;
      updateInfo(d.name);
    });
    legend.appendChild(chip);
  });
}
buildLegend();

function updateInfo(name) {
  const p = planetMap[name]?.data || planetData[0];
  document.getElementById('info-title').innerHTML = `<span class="dot" style="background:${p.color};color:${p.color}"></span>${p.name === 'Sun' ? 'Солнце' : p.name}`;
  document.getElementById('info-desc').textContent = p.desc;
  document.getElementById('info-diam').textContent = p.diam;
  document.getElementById('info-temp').textContent = p.temp;
  document.getElementById('info-mass').textContent = p.mass;
  document.getElementById('info-type').textContent = p.type;
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (e) => {
  if (e.target.closest('.controls') || e.target.closest('.legend') || e.target.closest('.info-card')) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(planets.map(p => p.mesh));
  if (hits.length) {
    const name = planets.find(p => p.mesh === hits[0].object).data.name;
    focusTarget = name;
    document.getElementById('focus').value = name;
    updateInfo(name);
  }
});

document.getElementById('btn-pause').addEventListener('click', (e) => {
  paused = !paused;
  e.target.textContent = paused ? 'Продолжить' : 'Пауза';
  e.target.classList.toggle('active', paused);
});

document.getElementById('btn-orbits').addEventListener('click', (e) => {
  showOrbits = !showOrbits;
  e.target.classList.toggle('active', showOrbits);
  orbits.forEach(o => o.visible = showOrbits);
});

document.getElementById('btn-labels').addEventListener('click', (e) => {
  showLabels = !showLabels;
  e.target.classList.toggle('active', showLabels);
  labels.forEach(l => l.el.style.opacity = showLabels ? '1' : '0');
});

document.getElementById('speed').addEventListener('input', (e) => {
  speed = parseFloat(e.target.value);
});

document.getElementById('focus').addEventListener('change', (e) => {
  focusTarget = e.target.value || null;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (!paused) {
    time += delta * speed;
    planets.forEach(p => {
      if (p.data.name === 'Sun') {
        p.mesh.rotation.y += delta * 0.05 * speed;
        return;
      }
      p.angle += (delta * p.data.speed * 0.05 * speed);
      const d = p.data.distance;
      p.group.position.x = Math.cos(p.angle) * d;
      p.group.position.z = Math.sin(p.angle) * d;
      p.mesh.rotation.y += delta * 0.2 * speed;
      if (p.data.moonPivot) {
        p.data.moonPivot.rotation.y += delta * 0.8 * speed;
      }
    });
  }

  if (focusTarget && planetMap[focusTarget]) {
    const target = planetMap[focusTarget].group.position.clone();
    const offset = focusTarget === 'Sun' ? new THREE.Vector3(0, 40, 90) : new THREE.Vector3(0, 18, 42);
    const desired = target.clone().add(offset);
    camera.position.lerp(desired, 0.04);
    controls.target.lerp(target, 0.06);
  }

  controls.update();

  labels.forEach(l => {
    if (!showLabels) return;
    const pos = l.group.position.clone();
    pos.y += (planetMap[l.name].data.radius + 4);
    pos.project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-(pos.y * 0.5) + 0.5) * window.innerHeight;
    l.el.style.transform = `translate(-50%, -50%)`;
    l.el.style.left = `${x}px`;
    l.el.style.top = `${y}px`;
  });

  renderer.render(scene, camera);
}

document.getElementById('loader').classList.add('hidden');
animate();
</script>
</body>
</html>
