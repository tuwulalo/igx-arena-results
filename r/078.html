<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 — Классическая игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #776e65;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .score-label {
            font-size: 11px;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            line-height: 1.5;
        }

        .new-game-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .new-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .new-game-btn:active {
            transform: translateY(0);
        }

        .game-board {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 12px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            position: relative;
        }

        .cell {
            aspect-ratio: 1;
            background: #cdc1b4;
            border-radius: 8px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.15s ease-in-out;
            z-index: 10;
        }

        .tile.merged {
            animation: merge 0.3s ease-in-out;
        }

        .tile.new {
            animation: appear 0.2s ease-in-out;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes merge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 32px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 28px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 28px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 24px; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.5s ease-in-out;
        }

        .overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .overlay-message {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
            text-align: center;
        }

        .overlay-message.win {
            color: #f9f6f2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .overlay-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin: 5px;
        }

        .overlay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .overlay-btn:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 8px;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            line-height: 1.6;
        }

        .instructions strong {
            color: #fff;
        }

        @media (max-width: 520px) {
            .title {
                font-size: 48px;
            }

            .score-box {
                padding: 8px 12px;
                min-width: 60px;
            }

            .score-value {
                font-size: 18px;
            }

            .grid {
                gap: 8px;
            }

            .game-board {
                padding: 8px;
            }

            .tile {
                font-size: 24px !important;
            }

            .overlay-message {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">Счёт</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Рекорд</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <p class="subtitle">Соединяйте плитки, чтобы получить <strong>2048</strong>!</p>
            <button class="new-game-btn" id="new-game-btn">Новая игра</button>
        </div>

        <div class="game-board">
            <div class="grid" id="grid">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="overlay" id="overlay">
                <div class="overlay-message" id="overlay-message"></div>
                <div>
                    <button class="overlay-btn" id="overlay-new-game">Новая игра</button>
                    <button class="overlay-btn" id="overlay-continue" style="display: none;">Продолжить</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <strong>Как играть:</strong> Используйте стрелки на клавиатуре или свайпы для перемещения плиток. 
            Плитки с одинаковыми числами сливаются в одну при столкновении. Цель — создать плитку со значением 2048!
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('best2048')) || 0;
                this.gameWon = false;
                this.gameOver = false;
                this.keepPlaying = false;
                
                this.gridElement = document.getElementById('grid');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.overlay = document.getElementById('overlay');
                this.overlayMessage = document.getElementById('overlay-message');
                this.overlayContinue = document.getElementById('overlay-continue');
                
                this.tileSize = 0;
                this.tileGap = 0;
                
                this.init();
                this.setupEventListeners();
                this.updateBestScore();
            }

            init() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameWon = false;
                this.gameOver = false;
                this.keepPlaying = false;
                this.overlay.classList.remove('active');
                this.addRandomTile();
                this.addRandomTile();
                this.updateDisplay();
                this.calculateTileDimensions();
            }

            calculateTileDimensions() {
                const gridRect = this.gridElement.getBoundingClientRect();
                const cells = this.gridElement.querySelectorAll('.cell');
                if (cells.length > 0) {
                    const cellRect = cells[0].getBoundingClientRect();
                    this.tileSize = cellRect.width;
                    
                    if (cells.length > 1) {
                        const cellRect2 = cells[1].getBoundingClientRect();
                        this.tileGap = cellRect2.left - cellRect.left - this.tileSize;
                    }
                }
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
                document.getElementById('new-game-btn').addEventListener('click', () => this.init());
                document.getElementById('overlay-new-game').addEventListener('click', () => this.init());
                document.getElementById('overlay-continue').addEventListener('click', () => this.continueGame());
                
                let touchStartX = 0;
                let touchStartY = 0;
                
                this.gridElement.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });
                
                this.gridElement.addEventListener('touchend', (e) => {
                    if (!touchStartX || !touchStartY) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    
                    const diffX = touchEndX - touchStartX;
                    const diffY = touchEndY - touchStartY;
                    
                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (diffX > 30) {
                            this.move('right');
                        } else if (diffX < -30) {
                            this.move('left');
                        }
                    } else {
                        if (diffY > 30) {
                            this.move('down');
                        } else if (diffY < -30) {
                            this.move('up');
                        }
                    }
                    
                    touchStartX = 0;
                    touchStartY = 0;
                });

                window.addEventListener('resize', () => {
                    this.calculateTileDimensions();
                    this.updateDisplay();
                });
            }

            handleKeyPress(e) {
                if (this.gameOver || (this.gameWon && !this.keepPlaying)) return;
                
                const keyMap = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down',
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right'
                };
                
                if (keyMap[e.key]) {
                    e.preventDefault();
                    this.move(keyMap[e.key]);
                }
            }

            addRandomTile() {
                const emptyCells = [];
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.grid[row][col] === 0) {
                            emptyCells.push({ row, col });
                        }
                    }
                }
                
                if (emptyCells.length > 0) {
                    const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
                    return randomCell;
                }
                return null;
            }

            move(direction) {
                if (this.gameOver || (this.gameWon && !this.keepPlaying)) return;
                
                const oldGrid = JSON.parse(JSON.stringify(this.grid));
                let moved = false;
                let mergedCells = [];
                
                if (direction === 'left' || direction === 'right') {
                    for (let row = 0; row < this.size; row++) {
                        const line = this.grid[row].slice();
                        const result = this.slideAndMerge(line, direction === 'right');
                        this.grid[row] = result.line;
                        this.score += result.score;
                        if (JSON.stringify(line) !== JSON.stringify(result.line)) {
                            moved = true;
                        }
                        mergedCells.push(...result.mergedIndices.map(col => ({ row, col })));
                    }
                } else {
                    for (let col = 0; col < this.size; col++) {
                        const line = [];
                        for (let row = 0; row < this.size; row++) {
                            line.push(this.grid[row][col]);
                        }
                        const result = this.slideAndMerge(line, direction === 'down');
                        for (let row = 0; row < this.size; row++) {
                            this.grid[row][col] = result.line[row];
                        }
                        this.score += result.score;
                        if (JSON.stringify(line) !== JSON.stringify(result.line)) {
                            moved = true;
                        }
                        mergedCells.push(...result.mergedIndices.map(row => ({ row, col })));
                    }
                }
                
                if (moved) {
                    const newTile = this.addRandomTile();
                    this.updateDisplay(mergedCells, newTile);
                    this.updateScore();
                    
                    if (!this.keepPlaying && this.hasWon()) {
                        this.gameWon = true;
                        this.showOverlay('Победа! 🎉', true);
                    } else if (this.isGameOver()) {
                        this.gameOver = true;
                        this.showOverlay('Игра окончена', false);
                    }
                }
            }

            slideAndMerge(line, reverse) {
                if (reverse) line.reverse();
                
                let filtered = line.filter(x => x !== 0);
                let score = 0;
                let mergedIndices = [];
                
                for (let i = 0; i < filtered.length - 1; i++) {
                    if (filtered[i] === filtered[i + 1]) {
                        filtered[i] *= 2;
                        score += filtered[i];
                        filtered.splice(i + 1, 1);
                        mergedIndices.push(i);
                    }
                }
                
                while (filtered.length < this.size) {
                    filtered.push(0);
                }
                
                if (reverse) {
                    filtered.reverse();
                    mergedIndices = mergedIndices.map(i => this.size - 1 - i);
                }
                
                return { line: filtered, score, mergedIndices };
            }

            hasWon() {
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.grid[row][col] === 2048) return true;
                    }
                }
                return false;
            }

            isGameOver() {
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.grid[row][col] === 0) return false;
                        if (col < this.size - 1 && this.grid[row][col] === this.grid[row][col + 1]) return false;
                        if (row < this.size - 1 && this.grid[row][col] === this.grid[row + 1][col]) return false;
                    }
                }
                return true;
            }

            updateDisplay(mergedCells = [], newTile = null) {
                const existingTiles = this.gridElement.querySelectorAll('.tile');
                existingTiles.forEach(tile => tile.remove());
                
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        const value = this.grid[row][col];
                        if (value !== 0) {
                            const tile = this.createTile(row, col, value);
                            
                            if (mergedCells.some(cell => cell.row === row && cell.col === col)) {
                                tile.classList.add('merged');
                            }
                            
                            if (newTile && newTile.row === row && newTile.col === col) {
                                tile.classList.add('new');
                            }
                            
                            this.gridElement.appendChild(tile);
                        }
                    }
                }
            }

            createTile(row, col, value) {
                const tile = document.createElement('div');
                tile.className = `tile tile-${value <= 2048 ? value : 'super'}`;
                tile.textContent = value;
                
                const x = col * (this.tileSize + this.tileGap);
                const y = row * (this.tileSize + this.tileGap);
                
                tile.style.width = `${this.tileSize}px`;
                tile.style.height = `${this.tileSize}px`;
                tile.style.left = `${x}px`;
                tile.style.top = `${y}px`;
                tile.style.fontSize = value < 100 ? '36px' : value < 1000 ? '32px' : '28px';
                
                return tile;
            }

            updateScore() {
                this.scoreElement.textContent = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('best2048', this.bestScore);
                    this.updateBestScore();
                }
            }

            updateBestScore() {
                this.bestScoreElement.textContent = this.bestScore;
            }

            showOverlay(message, isWin) {
                this.overlayMessage.textContent = message;
                this.overlayMessage.className = 'overlay-message' + (isWin ? ' win' : '');
                this.overlayContinue.style.display = isWin ? 'inline-block' : 'none';
                this.overlay.classList.add('active');
            }

            continueGame() {
                this.keepPlaying = true;
                this.overlay.classList.remove('active');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Game2048();
        });
    </script>
</body>
</html>
