<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>3D Flappy Bird</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#05070f;overflow:hidden;font-family:Inter,system-ui,sans-serif}
#game{display:block;width:100%;height:100vh}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none}
.panel{background:rgba(6,9,22,.97);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.07);border-radius:32px;padding:62px 78px;text-align:center;color:#fff;box-shadow:0 35px 90px -20px #000;pointer-events:auto}
h1{font-size:82px;font-weight:900;letter-spacing:-6.5px;margin-bottom:2px;background:linear-gradient(90deg,#fff,#6474ff,#a5b4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:15px;opacity:.5;margin-bottom:46px;letter-spacing:1.2px}
.btn{background:#6366f1;color:#fff;border:0;padding:18px 66px;font-size:17px;font-weight:800;border-radius:999px;cursor:pointer;transition:all .12s;margin:7px;box-shadow:0 14px 25px -6px #6366f1}
.btn:hover{transform:translateY(-2px) scale(1.015);background:#818cf8}
#hud{position:absolute;top:32px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none}
#score{font-size:112px;font-weight:900;color:#fff;text-shadow:0 14px 35px #000;letter-spacing:-8px}
#gameover{display:none}
#finalScore{font-size:152px;font-weight:900;line-height:.8;color:#fff;margin:4px 0 18px}
.small{font-size:13px;opacity:.45;margin-top:42px}
</style></head><body><canvas id="game"></canvas><div id="overlay"><div id="menu" class="panel"><h1>FLAPPY 3D</h1><div class="subtitle">ПОЛНОЦЕННАЯ ТРЁХМЕРНАЯ РЕАЛИЗАЦИЯ • ВЫСОКОЕ КАЧЕСТВО</div><button class="btn" onclick="startGame()">ЗАПУСТИТЬ ИГРУ</button><div class="small">SPACE / ЛКМ / TAP — взмах • ESC — вернуться в меню</div></div><div id="gameover" class="panel"><div style="font-size:24px;letter-spacing:8px;opacity:.45">ИГРА ЗАВЕРШЕНА</div><div id="finalScore">000</div><button class="btn" onclick="restartGame()">ИГРАТЬ СНОВА</button><div class="small">ЛУЧШИЙ РЕЗУЛЬТАТ: <span id="bestScore">0</span></div></div></div><div id="hud"><div id="score">0</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script><script>
const cv=document.getElementById('game'),ren=new THREE.WebGLRenderer({canvas:cv,antialias:!0,alpha:!0,powerPreference:'high-performance'});
ren.setPixelRatio(Math.min(devicePixelRatio,2));ren.shadowMap.enabled=!0;ren.shadowMap.type=THREE.PCFSoftShadowMap;
let scn,cam,brd,pipes=[],scr=0,best=localStorage.getItem('fb3d-max')||0,st='menu',vel=0,clk,particles=[],fog,stars,envL;
function rsz(){ren.setSize(innerWidth,innerHeight);if(cam){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix()}}
addEventListener('resize',rsz);
function mkWorld(){
  scn=new THREE.Scene();cam=new THREE.PerspectiveCamera(67,innerWidth/innerHeight,.07,420);cam.position.set(-6.5,6.8,27.5);
  const sky=new THREE.Mesh(new THREE.SphereGeometry(280,28,26),new THREE.MeshBasicMaterial({color:0x05091b,side:THREE.BackSide}));scn.add(sky);
  fog=new THREE.Fog(0x05091b,68,265);scn.fog=fog;
  const sun=new THREE.DirectionalLight(0xffe3b3,1.38);sun.position.set(68,122,-92);sun.castShadow=!0;sun.shadow.mapSize.set(2560,2560);
  sun.shadow.camera.near=22;sun.shadow.camera.far=310;sun.shadow.camera.left=-82;sun.shadow.camera.right=82;sun.shadow.camera.top=62;sun.shadow.camera.bottom=-54;scn.add(sun);
  scn.add(new THREE.HemisphereLight(0x445577,0x112211,.72));scn.add(new THREE.AmbientLight(0x334466,.58));
  stars=new THREE.Group();for(let i=0;i<180;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(Math.random()*.32+.14,6,5),new THREE.MeshBasicMaterial({color:0xccd5ff}));s.position.set(Math.random()*420-210,8+Math.random()*72,-90-Math.random()*130);stars.add(s)}scn.add(stars);
  const grd=new THREE.Mesh(new THREE.PlaneGeometry(560,560),new THREE.MeshLambertMaterial({color:0x0d1f14}));grd.rotation.x=-Math.PI/2;grd.position.y=-7.8;grd.receiveShadow=!0;scn.add(grd);
  scn.add(new THREE.GridHelper(540,160,0x1f2f24,0x0f1913));
  envL=new THREE.Group();for(let k=0;k<5;k++){const tr=new THREE.Mesh(new THREE.CylinderGeometry(2.1,3.8,14+Math.random()*7,6),new THREE.MeshLambertMaterial({color:0x2a3f2d,flatShading:!0}));tr.position.set(-95+k*52,-1.4,-76);tr.castShadow=!0;envL.add(tr)}scn.add(envL);
  brd=new THREE.Group();
  const bod=new THREE.Mesh(new THREE.SphereGeometry(1.1,38,28),new THREE.MeshLambertMaterial({color:0xffd40f,flatShading:!0}));bod.castShadow=!0;brd.add(bod);
  const wng=new THREE.Mesh(new THREE.ConeGeometry(.85,2.3,4),new THREE.MeshLambertMaterial({color:0xf8c600,flatShading:!0}));wng.rotation.set(0,0,1.57);wng.position.set(-.15,.12,.1);brd.add(wng);
  const bk=new THREE.Mesh(new THREE.ConeGeometry(.45,1.5,3),new THREE.MeshLambertMaterial({color:0xf25c00}));bk.rotation.z=-1.57;bk.position.set(1.42,.03,0);brd.add(bk);
  const eye=new THREE.Mesh(new THREE.SphereGeometry(.34,24,20),new THREE.MeshLambertMaterial({color:0x0f1628}));eye.position.set(.74,.71,.82);brd.add(eye.clone());eye.position.z=-.82;brd.add(eye);
  const crst=new THREE.Mesh(new THREE.CylinderGeometry(.17,.27,1,12),new THREE.MeshLambertMaterial({color:0xffd40f}));crst.rotation.z=.48;crst.position.set(-.38,1.14,0);brd.add(crst);
  const tl=new THREE.Mesh(new THREE.ConeGeometry(.22,.95,5),new THREE.MeshLambertMaterial({color:0xf8c600}));tl.rotation.z=2.3;tl.position.set(-1.38,.2,0);brd.add(tl);
  brd.position.set(-9.8,2,-2);scn.add(brd);pipes=[];clk=new THREE.Clock();particles=[];
}
function addPipe(){
  const gap=6.35,h=THREE.MathUtils.randFloat(1.9,9.6);
  const mat=new THREE.MeshLambertMaterial({color:0x3ada7f,flatShading:!0});
  const tp=new THREE.Mesh(new THREE.CylinderGeometry(1.68,1.68,18,24),mat);tp.castShadow=tp.receiveShadow=!0;tp.position.set(0,13+h+gap/2,-4.4);tp.rotation.x=Math.PI*.5;
  const bt=new THREE.Mesh(new THREE.CylinderGeometry(1.68,1.68,18,24),mat);bt.castShadow=bt.receiveShadow=!0;bt.position.set(0,-13+h-gap/2,-4.4);bt.rotation.x=Math.PI*.5;
  const rT=new THREE.Mesh(new THREE.TorusGeometry(1.95,.42,12,34),new THREE.MeshLambertMaterial({color:0x16a34d}));rT.rotation.y=Math.PI*.5;rT.position.set(0,h+gap/2+.9,-4.4);
  const rB=rT.clone();rB.position.y=h-gap/2-1.1;
  const grp=new THREE.Group();grp.add(tp,bt,rT,rB);grp.userData={psd:!1,yy:h,gp:gap};grp.position.x=54;scn.add(grp);pipes.push(grp);
}
function resetAll(){
  scr=0;vel=0;document.getElementById('score').textContent='0';brd.position.set(-9.8,2,-2);brd.rotation.set(0,0,0);
  pipes.forEach(p=>scn.remove(p));pipes.length=0;particles.forEach(p=>scn.remove(p));particles.length=0;
  for(let j=0;j<7;j++){addPipe();pipes[j].position.x=19+j*16.4}
}
function doFlap(){
  if(st!=='playing')return;vel=9.75;
  const ww=brd.children[1];ww.rotation.z=3.05;setTimeout(()=>ww&&(ww.rotation.z=1.57),155);
  for(let n=0;n<9;n++){const p=new THREE.Mesh(new THREE.SphereGeometry(.23+Math.random()*.09,9,7),new THREE.MeshBasicMaterial({color:0xfff4b8,transparent:!0,opacity:.88}));
    p.position.copy(brd.position);p.position.x+=.6+Math.random()*.4;p.userData={vx:Math.random()*-1.05-.5,vy:Math.random()*2.1-4.8,vz:(Math.random()-.5)*2.3,life:50+Math.random()*20};scn.add(p);particles.push(p)}
}
function gameTick(){
  if(st!=='playing')return;const dT=clk.getDelta()*59;
  vel-=.335*dT;brd.position.y+=vel*.085*dT;brd.rotation.z=THREE.MathUtils.clamp(vel*.041,-1.18,1.32);brd.position.x+=.335;
  cam.position.x=brd.position.x+8.2;cam.position.y=THREE.MathUtils.lerp(cam.position.y,brd.position.y+4.8,.085);cam.lookAt(brd.position.x+14.5,brd.position.y+2,0);
  pipes.forEach((pipe,i)=>{
    pipe.position.x-=.745*dT;
    if(!pipe.userData.psd&&pipe.position.x<brd.position.x-1.4){pipe.userData.psd=!0;scr++;document.getElementById('score').textContent=scr}
    if(pipe.position.x>-16.2&&pipe.position.x<8.5){
      const birdY=brd.position.y,gy=pipe.userData.yy,gp=pipe.userData.gp;
      if(birdY>gy+gp/2-1.75||birdY<gy-gp/2+1.8)finish();
    }
    if(pipe.position.x<-75){scn.remove(pipe);pipes.splice(i,1);addPipe()}
  });
  if(brd.position.y<-7.4||brd.position.y>18.8)finish();
  if(pipes.length<8&&pipes[pipes.length-1].position.x<39)addPipe();
  particles.forEach((pt,k)=>{pt.position.x+=pt.userData.vx*dT*.9;pt.position.y+=pt.userData.vy*dT*.86;pt.position.z+=pt.userData.vz*dT*.9;pt.userData.life-=dT*1.5;pt.material.opacity=pt.userData.life/58;if(pt.userData.life<=0){scn.remove(pt);particles.splice(k,1)}});
  stars.rotation.y=dT*.0006;
}
function finish(){
  st='gameover';document.getElementById('gameover').style.display='block';document.getElementById('menu').style.display='none';
  document.getElementById('finalScore').innerHTML=scr;if(scr>best){best=scr;localStorage.setItem('fb3d-max',best)}document.getElementById('bestScore').innerHTML=best;document.getElementById('hud').style.display='none';
}
function renderLoop(){
  requestAnimationFrame(renderLoop);
  if(st==='playing')gameTick();
  if(brd&&st!=='playing')brd.children[1].rotation.z=Math.sin(Date.now()/410)*.24+1.57;
  ren.render(scn,cam);
}
function startGame(){document.getElementById('menu').style.display='none';document.getElementById('gameover').style.display='none';document.getElementById('hud').style.display='flex';st='playing';resetAll()}
function restartGame(){document.getElementById('gameover').style.display='none';st='playing';document.getElementById('hud').style.display='flex';resetAll()}
function boot(){
  mkWorld();rsz();addEventListener('keydown',ev=>{if(ev.key===' '){ev.preventDefault();doFlap()}if(ev.key==='Escape'&&st==='playing'){st='menu';document.getElementById('menu').style.display='flex';document.getElementById('gameover').style.display='none'}});
  addEventListener('mousedown',e=>e.button===0&&doFlap());addEventListener('touchstart',ev=>{ev.preventDefault();doFlap()});document.getElementById('bestScore').innerHTML=best;renderLoop();
}
boot();
</script></body></html>
