<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo — elegant task manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --bg-card: #16213e;
    --bg-input: #1c1c38;
    --text-primary: #e8e8f0;
    --text-secondary: #8b8ba8;
    --text-muted: #5a5a7a;
    --accent: #6c63ff;
    --accent-hover: #7d75ff;
    --accent-glow: rgba(108, 99, 255, 0.25);
    --success: #2dd4bf;
    --danger: #f87171;
    --border: #2a2a45;
    --border-hover: #3a3a58;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.5);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108, 99, 255, 0.08), transparent),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(45, 212, 191, 0.04), transparent);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 60px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .app {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeSlideIn 0.5s ease-out;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 8px 0 0;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--success) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header .subtitle {
    margin-top: 4px;
    font-size: 0.88rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ── Card ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 24px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(10px);
  }

  /* ── Add form ── */
  .add-form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .add-form input {
    flex: 1;
    background: var(--bg-input);
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 0.95rem;
    color: var(--text-primary);
    font-family: inherit;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .add-form input::placeholder {
    color: var(--text-muted);
  }

  .add-form input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn-add {
    background: var(--accent);
    color: #fff;
    padding: 12px 20px;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .btn-add:hover {
    background: var(--accent-hover);
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .btn-add:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 4px;
    background: var(--bg-input);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: 16px;
  }

  .filter-btn {
    flex: 1;
    padding: 8px 12px;
    background: transparent;
    border: none;
    border-radius: calc(var(--radius-md) - 2px);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.84rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
  }

  .filter-btn .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    background: rgba(108, 99, 255, 0.2);
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
    transition: all var(--transition);
  }

  .filter-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .filter-btn.active .badge {
    background: rgba(255,255,255,0.25);
    color: #fff;
  }

  /* ── Todo list ── */
  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 40px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    transition: all var(--transition);
    animation: itemIn 0.25s ease-out;
    position: relative;
    overflow: hidden;
  }

  @keyframes itemIn {
    from { opacity: 0; transform: translateX(-10px) scale(0.97); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  .todo-item.removing {
    animation: itemOut 0.25s ease-in forwards;
  }

  @keyframes itemOut {
    from { opacity: 1; transform: translateX(0) scale(1); }
    to   { opacity: 0; transform: translateX(30px) scale(0.95); }
  }

  .todo-item:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-sm);
  }

  .todo-item.completed {
    opacity: 0.55;
  }

  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  /* Custom checkbox */
  .checkbox-wrap {
    flex-shrink: 0;
    position: relative;
    width: 22px;
    height: 22px;
  }

  .checkbox-wrap input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 1;
  }

  .checkmark {
    position: absolute;
    top: 0; left: 0;
    width: 22px;
    height: 22px;
    border: 2px solid var(--border-hover);
    border-radius: 6px;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .checkmark svg {
    width: 12px;
    height: 12px;
    opacity: 0;
    transform: scale(0.5);
    transition: all var(--transition);
  }

  .checkbox-wrap input:checked + .checkmark {
    background: var(--success);
    border-color: var(--success);
  }

  .checkbox-wrap input:checked + .checkmark svg {
    opacity: 1;
    transform: scale(1);
  }

  .todo-text {
    flex: 1;
    font-size: 0.95rem;
    line-height: 1.4;
    word-break: break-word;
    transition: color var(--transition);
  }

  .todo-time {
    font-size: 0.72rem;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-left: auto;
    padding-left: 8px;
  }

  .btn-delete {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-size: 1.1rem;
    padding: 0;
  }

  .btn-delete:hover {
    background: rgba(248, 113, 113, 0.12);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--danger);
  }

  .btn-delete svg {
    width: 16px;
    height: 16px;
    pointer-events: none;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .empty-state .hint {
    font-size: 0.8rem;
    opacity: 0.6;
  }

  /* ── Footer bar ── */
  .footer-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .items-left {
    font-weight: 500;
  }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    padding: 6px 12px;
    transition: all var(--transition);
  }

  .btn-clear:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(248, 113, 113, 0.06);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 20px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-primary);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast .undo-link {
    color: var(--accent);
    cursor: pointer;
    pointer-events: all;
    font-weight: 600;
    margin-left: 4px;
    transition: color var(--transition);
  }

  .toast .undo-link:hover {
    color: var(--accent-hover);
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body { padding: 20px 12px 40px; }
    .header h1 { font-size: 1.6rem; }
    .card { padding: 16px; border-radius: var(--radius-lg); }
    .add-form { flex-direction: column; }
    .filter-btn { font-size: 0.78rem; padding: 8px 6px; }
    .todo-item { padding: 10px 10px; }
    .footer-bar { flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>Todo</h1>
    <p class="subtitle">Планируй, выполняй, достигай</p>
  </header>

  <div class="card">
    <form class="add-form" id="addForm" autocomplete="off">
      <input type="text" id="todoInput" placeholder="Что нужно сделать?" maxlength="160" />
      <button type="submit" class="btn btn-add" id="addBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить
      </button>
    </form>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">
        Все <span class="badge" id="badgeAll">0</span>
      </button>
      <button class="filter-btn" data-filter="active">
        Активные <span class="badge" id="badgeActive">0</span>
      </button>
      <button class="filter-btn" data-filter="completed">
        Готово <span class="badge" id="badgeCompleted">0</span>
      </button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer-bar" id="footerBar">
      <span class="items-left" id="itemsLeft">0 задач осталось</span>
      <button class="btn-clear" id="btnClear" style="visibility:hidden">Очистить готовые</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const STORAGE_KEY = 'todo_app_data_v2';

  const $input    = document.getElementById('todoInput');
  const $addBtn   = document.getElementById('addBtn');
  const $addForm  = document.getElementById('addForm');
  const $list     = document.getElementById('todoList');
  const $filters  = document.getElementById('filters');
  const $footer   = document.getElementById('footerBar');
  const $clearBtn = document.getElementById('btnClear');
  const $itemsLeft = document.getElementById('itemsLeft');
  const $badgeAll     = document.getElementById('badgeAll');
  const $badgeActive  = document.getElementById('badgeActive');
  const $badgeCompleted = document.getElementById('badgeCompleted');
  const $toast    = document.getElementById('toast');

  let todos = [];
  let currentFilter = 'all';
  let toastTimer = null;
  let lastDeleted = null;

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function loadTodos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      todos = raw ? JSON.parse(raw) : [];
    } catch (e) {
      todos = [];
    }
  }

  function saveTodos() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) {}
  }

  function getFiltered() {
    if (currentFilter === 'active')  return todos.filter(t => !t.done);
    if (currentFilter === 'completed') return todos.filter(t => t.done);
    return todos;
  }

  function showToast(msg, undoCallback) {
    if (toastTimer) clearTimeout(toastTimer);
    $toast.innerHTML = '';
    const span = document.createElement('span');
    span.textContent = msg;
    $toast.appendChild(span);

    if (undoCallback) {
      const undoLink = document.createElement('span');
      undoLink.className = 'undo-link';
      undoLink.textContent = 'Отменить';
      undoLink.addEventListener('click', () => {
        undoCallback();
        hideToast();
      });
      $toast.appendChild(undoLink);
    }

    requestAnimationFrame(() => {
      $toast.classList.add('show');
    });

    toastTimer = setTimeout(hideToast, 4000);
  }

  function hideToast() {
    $toast.classList.remove('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = null;
  }

  function pluralize(n, forms) {
    const m = Math.abs(n) % 100;
    const m1 = m % 10;
    if (m > 10 && m < 20) return forms[2];
    if (m1 > 1 && m1 < 5) return forms[1];
    if (m1 === 1) return forms[0];
    return forms[2];
  }

  function countActive() {
    return todos.filter(t => !t.done).length;
  }

  function countCompleted() {
    return todos.filter(t => t.done).length;
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60_000) return 'только что';
    if (diff < 3_600_000) return Math.floor(diff / 60_000) + ' мин';
    if (diff < 86_400_000) return Math.floor(diff / 3_600_000) + ' ч';
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return dd + '.' + mm;
  }

  function render() {
    const filtered = getFiltered();
    const activeCount = countActive();
    const doneCount = countCompleted();

    $badgeAll.textContent = todos.length;
    $badgeActive.textContent = activeCount;
    $badgeCompleted.textContent = doneCount;

    const word = pluralize(activeCount, ['задача', 'задачи', 'задач']);
    $itemsLeft.textContent = activeCount + ' ' + word + ' осталось';

    $clearBtn.style.visibility = doneCount > 0 ? 'visible' : 'hidden';

    if (todos.length === 0) {
      $footer.style.display = 'none';
      $list.innerHTML = `
        <li class="empty-state">
          <div class="icon">&#x1f389;</div>
          <p>Список пуст</p>
          <span class="hint">Добавь первую задачу — и вперёд!</span>
        </li>`;
      return;
    }

    $footer.style.display = '';

    if (filtered.length === 0) {
      $list.innerHTML = `
        <li class="empty-state">
          <div class="icon">&#x2705;</div>
          <p>${currentFilter === 'active' ? 'Все задачи выполнены!' : currentFilter === 'completed' ? 'Нет завершённых задач' : 'Нет задач'}</p>
          <span class="hint">${currentFilter === 'active' ? 'Ты молодец &#x1f31f;' : ''}</span>
        </li>`;
      return;
    }

    $list.innerHTML = filtered.map(t => {
      const checked = t.done ? ' checked' : '';
      const cls = t.done ? ' completed' : '';
      return `
        <li class="todo-item${cls}" data-id="${t.id}">
          <label class="checkbox-wrap" title="${t.done ? 'Вернуть в работу' : 'Отметить готовым'}">
            <input type="checkbox" ${checked} data-action="toggle" data-id="${t.id}">
            <span class="checkmark">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
          </label>
          <span class="todo-text">${escapeHtml(t.text)}</span>
          <span class="todo-time">${formatTime(t.created)}</span>
          <button class="btn-delete" data-action="delete" data-id="${t.id}" title="Удалить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </li>`;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function addTodo(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    todos.unshift({
      id: uid(),
      text: trimmed.slice(0, 160),
      done: false,
      created: new Date().toISOString()
    });
    saveTodos();
    render();
    $input.value = '';
    $input.focus();
    $addBtn.disabled = true;
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    saveTodos();
    render();
  }

  function deleteTodo(id) {
    const idx = todos.findIndex(t => t.id === id);
    if (idx === -1) return;
    lastDeleted = todos.splice(idx, 1)[0];
    saveTodos();
    render();
    showToast('«' + (lastDeleted.text.length > 30 ? lastDeleted.text.slice(0,30) + '…' : lastDeleted.text) + '» удалена', () => {
      if (lastDeleted) {
        todos.unshift(lastDeleted);
        lastDeleted = null;
        saveTodos();
        render();
      }
    });
  }

  function clearCompleted() {
    const done = todos.filter(t => t.done);
    if (done.length === 0) return;
    const backup = [...done];
    todos = todos.filter(t => !t.done);
    saveTodos();
    render();
    showToast(done.length + ' ' + pluralize(done.length, ['задача', 'задачи', 'задач']) + ' очищено', () => {
      todos.push(...backup);
      saveTodos();
      render();
    });
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    render();
  }

  // Event delegation
  $list.addEventListener('click', function(e) {
    const action = e.target.dataset.action;
    const id = e.target.dataset.id;
    if (!action || !id) return;

    if (action === 'toggle') {
      const li = e.target.closest('.todo-item');
      if (li) li.style.transition = 'opacity 0.15s, transform 0.15s';
      toggleTodo(id);
    } else if (action === 'delete') {
      const li = e.target.closest('.todo-item');
      if (li) {
        li.classList.add('removing');
        li.addEventListener('animationend', function handler() {
          li.removeEventListener('animationend', handler);
          deleteTodo(id);
        }, { once: true });
      } else {
        deleteTodo(id);
      }
    }
  });

  $addForm.addEventListener('submit', function(e) {
    e.preventDefault();
    addTodo($input.value);
  });

  $input.addEventListener('input', function() {
    $addBtn.disabled = this.value.trim().length === 0;
  });

  $input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      this.value = '';
      $addBtn.disabled = true;
      this.blur();
    }
  });

  $filters.addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    setFilter(btn.dataset.filter);
  });

  $clearBtn.addEventListener('click', clearCompleted);

  // Init
  loadTodos();
  setFilter('all');
  $input.focus();
})();
</script>
</body>
</html>
