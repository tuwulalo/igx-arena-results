<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Умный список задач</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: scroll;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }

        .container {
            width: 100%;
            max-width: 640px;
            margin-top: 20px;
        }

        /* App Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: var(--accent);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-icon svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats Card */
        .stats-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stats-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stats-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 50%;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.08);
            height: 8px;
            border-radius: 4px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent) 0%, #818cf8 100%);
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .progress-percent {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            min-width: 35px;
            text-align: right;
        }

        /* Input Form */
        .todo-form {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .todo-input {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 16px 16px 16px 48px;
            color: var(--text-primary);
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }

        .todo-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .todo-input::placeholder {
            color: var(--text-muted);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 0 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .add-btn:active {
            transform: translateY(1px);
        }

        /* Controls & Filters */
        .controls-bar {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 12px;
        }

        .filters {
            display: flex;
            gap: 6px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-btn.active {
            color: white;
            background: var(--accent);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clear-btn:hover {
            color: var(--danger);
        }

        /* Todo List */
        .todo-list {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-top: none;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            list-style: none;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: var(--transition);
            animation: slideIn 0.3s ease;
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .todo-item.completed .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .todo-item.removing {
            animation: slideOut 0.25s ease forwards;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-grow: 1;
            cursor: pointer;
        }

        /* Custom Checkbox */
        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .todo-item.completed .checkbox {
            border-color: var(--success);
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
        }

        .checkbox svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: scale(0);
            transition: var(--transition);
        }

        .todo-item.completed .checkbox svg {
            transform: scale(1);
        }

        .todo-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
            word-break: break-word;
            transition: var(--transition);
        }

        /* Delete Button */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .todo-item:hover .delete-btn,
        .todo-item:focus-within .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(244, 63, 94, 0.1);
        }

        .delete-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Empty State */
        .empty-state {
            padding: 48px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            stroke: var(--text-muted);
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
            font-weight: 500;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(30px);
                height: 0;
                padding-top: 0;
                padding-bottom: 0;
                border: none;
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            body {
                padding: 16px 12px;
            }

            .stats-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .progress-container {
                width: 100%;
            }

            .todo-form {
                flex-direction: column;
            }

            .add-btn {
                padding: 14px;
                justify-content: center;
            }

            .controls-bar {
                flex-direction: column-reverse;
                align-items: stretch;
            }

            .filters {
                justify-content: space-between;
            }

            .filter-btn {
                flex-grow: 1;
                text-align: center;
            }

            .clear-btn {
                justify-content: center;
                padding-bottom: 6px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .todo-item .delete-btn {
                opacity: 1; /* Always visible on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 11l3 3L22 4" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1>TaskFlow</h1>
            </div>
        </header>

        <!-- Stats Card -->
        <div class="stats-card">
            <div class="stats-info">
                <h3>Прогресс дня</h3>
                <p id="stats-counter">0 из 0 задач выполнено</p>
            </div>
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <span id="progress-percent" class="progress-percent">0%</span>
            </div>
        </div>

        <!-- Input Form -->
        <form id="todo-form" class="todo-form">
            <div class="input-wrapper">
                <div class="input-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </div>
                <input type="text" id="todo-input" class="todo-input" placeholder="Добавить новую задачу..." autocomplete="off" required>
            </div>
            <button type="submit" class="add-btn">
                Добавить
            </button>
        </form>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="filters">
                <button type="button" class="filter-btn active" data-filter="all">Все</button>
                <button type="button" class="filter-btn" data-filter="active">Активные</button>
                <button type="button" class="filter-btn" data-filter="completed">Выполненные</button>
            </div>
            <button type="button" id="clear-completed" class="clear-btn">
                Очистить выполненные
            </button>
        </div>

        <!-- Todo List -->
        <ul id="todo-list" class="todo-list">
            <!-- Items will be injected here via JS -->
        </ul>
    </div>

    <script>
        // State Management
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        // DOM Elements
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const statsCounter = document.getElementById('stats-counter');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const clearCompletedBtn = document.getElementById('clear-completed');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // Save to LocalStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Render Application
        function render() {
            // Filter tasks
            let filteredTasks = tasks;
            if (currentFilter === 'active') {
                filteredTasks = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(t => t.completed);
            }

            // Clear list
            todoList.innerHTML = '';

            // Render items or empty state
            if (filteredTasks.length === 0) {
                renderEmptyState();
            } else {
                filteredTasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${task.completed ? 'completed' : ''}`;
                    li.dataset.id = task.id;

                    li.innerHTML = `
                        <div class="item-left">
                            <div class="checkbox">
                                <svg viewBox="0 0 24 24">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                            <span class="todo-text">${escapeHTML(task.text)}</span>
                        </div>
                        <button class="delete-btn" aria-label="Удалить задачу">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    `;

                    // Toggle Event
                    li.querySelector('.item-left').addEventListener('click', () => toggleTask(task.id));
                    
                    // Delete Event
                    li.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTask(task.id, li);
                    });

                    todoList.appendChild(li);
                });
            }

            updateStats();
        }

        // Render Empty State
        function renderEmptyState() {
            let message = 'Список задач пуст';
            if (currentFilter === 'active') message = 'Нет активных задач';
            if (currentFilter === 'completed') message = 'Нет выполненных задач';

            todoList.innerHTML = `
                <div class="empty-state">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                    <p>${message}</p>
                </div>
            `;
        }

        // Update Statistics
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

            statsCounter.textContent = `${completed} из ${total} задач выполнено`;
            progressBar.style.width = `${percent}%`;
            progressPercent.textContent = `${percent}%`;

            // Hide or show clear button
            if (completed > 0) {
                clearCompletedBtn.style.visibility = 'visible';
                clearCompletedBtn.style.opacity = '1';
            } else {
                clearCompletedBtn.style.visibility = 'hidden';
                clearCompletedBtn.style.opacity = '0';
            }
        }

        // Add Task
        function addTask(text) {
            const newTask = {
                id: Date.now(),
                text: text.trim(),
                completed: false
            };
            tasks.unshift(newTask);
            saveTasks();
            render();
        }

        // Toggle Task
        function toggleTask(id) {
            tasks = tasks.map(task => {
                if (task.id === id) {
                    return { ...task, completed: !task.completed };
                }
                return task;
            });
            saveTasks();
            render();
        }

        // Delete Task with Animation
        function deleteTask(id, element) {
            element.classList.add('removing');
            element.addEventListener('animationend', () => {
                tasks = tasks.filter(task => task.id !== id);
                saveTasks();
                render();
            });
        }

        // Helper to escape HTML and prevent XSS
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Event Listeners

        // Form Submit
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (text) {
                addTask(text);
                todoInput.value = '';
                todoInput.focus();
            }
        });

        // Filter Buttons
        filterButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentFilter = button.dataset.filter;
                render();
            });
        });

        // Clear Completed
        clearCompletedBtn.addEventListener('click', () => {
            const completedItems = todoList.querySelectorAll('.todo-item.completed');
            if (completedItems.length === 0) {
                tasks = tasks.filter(task => !task.completed);
                saveTasks();
                render();
                return;
            }

            // Animate out completed items
            completedItems.forEach(item => item.classList.add('removing'));
            
            // Wait for animation to finish before updating state
            setTimeout(() => {
                tasks = tasks.filter(task => !task.completed);
                saveTasks();
                render();
            }, 250);
        });

        // Initial Render
        render();
    </script>
</body>
</html>
