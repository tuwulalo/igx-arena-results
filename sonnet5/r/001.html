/* ============================== CART LOGIC ============================== */

function toggleCart(id) {
  const product = PRODUCTS.find(p => p.id === id);
  const idx = state.cart.indexOf(id);
  if (idx === -1) {
    state.cart.push(id);
    showToast(`Добавлено: ${product.name}`, true);
  } else {
    state.cart.splice(idx, 1);
    showToast(`Удалено: ${product.name}`, false);
  }
  updateCartUI(id);
}

function updateCartUI(changedId) {
  // badge
  const badge = document.getElementById('cart-badge');
  if (badge) {
    badge.textContent = cartCount();
    badge.classList.toggle('hidden', cartCount() === 0);
    badge.classList.remove('badge-pop');
    void badge.offsetWidth;
    badge.classList.add('badge-pop');
  }
  const totalEl = document.querySelector('#cart-btn span.num-mono, #cart-btn span.hidden');
  if (totalEl) totalEl.textContent = fmtPrice(cartTotal());

  // all buttons for this product across the page
  document.querySelectorAll(`[data-cart-id="${changedId}"]`).forEach(btn => {
    const added = inCart(changedId);
    btn.classList.toggle('cart-btn-added', added);
    if (!added) {
      btn.classList.add('border-zinc-700','bg-white/[0.03]','text-zinc-200');
    } else {
      btn.classList.remove('border-zinc-700','bg-white/[0.03]','text-zinc-200');
    }
    btn.innerHTML = `<i data-lucide="${added ? 'check' : 'plus'}" class="w-3.5 h-3.5"></i> ${added ? 'В корзине' : 'В корзину'}`;
  });
  if (window.lucide) lucide.createIcons();
}

function bindCartButtons() {
  document.querySelectorAll('.cart-toggle-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      toggleCart(Number(btn.dataset.cartId));
    });
  });
}

let toastId = 0;
function showToast(msg, positive) {
  const container = document.getElementById('toast-container');
  const id = `toast-${++toastId}`;
  const el = document.createElement('div');
  el.id = id;
  el.className = 'toast-anim glass border border-zinc-800 rounded-xl px-4 py-3 flex items-center gap-3 shadow-card min-w-[220px]';
  el.innerHTML = `
    <div class="w-7 h-7 rounded-full ${positive ? 'bg-neon/15 text-neon' : 'bg-zinc-700/40 text-zinc-400'} flex items-center justify-center shrink-0">
      <i data-lucide="${positive ? 'check' : 'x'}" class="w-3.5 h-3.5"></i>
    </div>
    <span class="text-sm text-zinc-200">${msg}</span>`;
  container.appendChild(el);
  if (window.lucide) lucide.createIcons();
  setTimeout(() => {
    el.classList.add('toast-out');
    setTimeout(() => el.remove(), 300);
  }, 2200);
}

/* ============================== BENCH INTERACTION ============================== */

function bindBenchCards() {
  document.querySelectorAll('[data-bench]').forEach(card => {
    card.addEventListener('click', () => {
      const longEl = card.querySelector('.bench-long');
      const ctaEl = card.querySelector('.bench-cta');
      const chevron = card.querySelector('.bench-chevron');
      const isOpen = !longEl.classList.contains('hidden');
      longEl.classList.toggle('hidden');
      card.classList.toggle('active');
      ctaEl.textContent = isOpen ? 'Подробнее' : 'Свернуть';
      chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    });
  });
}

/* ============================== REVEAL ON SCROLL ============================== */

let revealObserver;
function bindReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
}

/* ============================== ROUTER ============================== */

function navigate(route) {
  location.hash = `/${route}`;
}

function render() {
  const app = document.getElementById('app');
  renderNavbar();
  let html = '';
  if (state.route === 'catalog') html = renderCatalog();
  else if (state.route === 'tech') html = renderTech();
  else html = renderHome();
  app.innerHTML = html;
  renderFooter();
  bindCartButtons();

  if (state.route === 'catalog') {
    renderCatalogGrid();
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.filter = btn.dataset.filter;
        document.querySelectorAll('[data-filter]').forEach(b => {
          const active = b.dataset.filter === state.filter;
          b.classList.toggle('bg-neon', active);
          b.classList.toggle('text-black', active);
          b.classList.toggle('border-neon', active);
          b.classList.toggle('shadow-glow', active);
          b.classList.toggle('border-zinc-700', !active);
          b.classList.toggle('text-zinc-300', !active);
        });
        renderCatalogGrid();
      });
    });
  }

  if (state.route === 'home') {
    bindBenchCards();
  }

  if (window.lucide) lucide.createIcons();
  bindReveal();
}

window.addEventListener('hashchange', () => {
  const r = (location.hash || '#/home').replace('#/', '').replace('#', '') || 'home';
  state.route = ['home','catalog','tech'].includes(r) ? r : 'home';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
});

if (!location.hash) location.hash = '/home';
render();
</script>
